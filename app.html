    const HE_MONTHS = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];
    const HE_MONTHS_SHORT = ['ינו', 'פבר', 'מרץ', 'אפר', 'מאי', 'יונ', 'יול', 'אוג', 'ספט', 'אוק', 'נוב', 'דצמ'];
    const ALL_SLOTS = ['07:00', '08:30', '10:00', '17:00', '18:30', '20:00'];

    function localDateStr(d) {
      return [
        d.getFullYear(),
        String(d.getMonth() + 1).padStart(2, '0'),
        String(d.getDate()).padStart(2, '0'),
      ].join('-');
    }

    // ── Calendar helpers ────────────────────────────────────────────────────
    function calDateStr(date, timeStr, offsetMin = 0) {
      const [h, m] = timeStr.split(':').map(Number);
      const d = new Date(date);
      d.setHours(h, m + offsetMin, 0, 0);
      return d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
    }
    function googleCalUrl({ date, time, type, durationMin }) {
      const start = calDateStr(date, time);
      const end = calDateStr(date, time, durationMin);
      const title = encodeURIComponent('שיעור יוגה עם אוריאן · ' + type);
      return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${encodeURIComponent('שיעור יוגה · אוריאן')}`;
    }
    function buildICS({ date, time, type, durationMin }) {
      const start = calDateStr(date, time);
      const end = calDateStr(date, time, durationMin);
      const uid = `yoga-orian-${start}@app`;
      return [
        'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//yoga-orian//app//HE',
        'BEGIN:VEVENT',
        `DTSTART:${start}`, `DTEND:${end}`,
        `SUMMARY:שיעור יוגה עם אוריאן · ${type}`,
        'DESCRIPTION:שיעור יוגה עם אוריאן',
        `UID:${uid}`,
        'END:VEVENT', 'END:VCALENDAR',
      ].join('\r\n');
    }
    function downloadICS(content, filename) {
      const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = Object.assign(document.createElement('a'), { href: url, download: filename });
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    }

    function Booking({ go }) {
      const [anchor, setAnchor] = React.useState(() => {
        const d = new Date(); d.setHours(0, 0, 0, 0);
        d.setDate(d.getDate() - d.getDay()); // start of this week (Sunday)
        return d;
      });
      const [selected, setSelected] = React.useState(() => {
        const d = new Date(); d.setHours(0, 0, 0, 0);
        if (d.getDay() === 6) d.setDate(d.getDate() + 1);
        return d;
      });
      const [allClasses, setAllClasses] = React.useState([]);   // loaded from Firebase
      const [fbLoading, setFbLoading] = React.useState(true);
      const [selectedClass, setSelectedClass] = React.useState(null); // the chosen class object
      const [confirmed, setConfirmed] = React.useState(false);
      const [guestOpen, setGuestOpen] = React.useState(false);
      const [guestForm, setGuestForm] = React.useState({ name: '', phone: '', email: '' });
      const [guestSent, setGuestSent] = React.useState(false);
      const [guestLoading, setGuestLoading] = React.useState(false);

      // Load real classes from Firebase, live
      React.useEffect(() => {
        const ref = firebase.database().ref('classes');
        ref.on('value', snap => {
          const data = snap.val() || {};
          const list = Object.entries(data).map(([id, val]) => ({
            id,
            ...val,
            attendees: val.attendees ? Object.values(val.attendees) : [],
          }));
          setAllClasses(list.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)));
          setFbLoading(false);
        });
        return () => ref.off();
      }, []);

      const week = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(anchor); d.setDate(anchor.getDate() + i); return d;
      });

      const isSame = (a, b) => a.toDateString() === b.toDateString();
      const monthLabel = `${HE_MONTHS[selected.getMonth()]} ${selected.getFullYear()}`;

      // Classes for the selected day, sorted by time
      const dayStr = localDateStr(selected);
      const dayClasses = allClasses.filter(c => c.date === dayStr);

      // Days that have at least one available (not full) class
      const hasAvail = (date) => {
        const ds = localDateStr(date);
        return allClasses.some(c => c.date === ds && c.attendees.length < c.capacity);
      };

      const isFull = (c) => c.attendees.length >= c.capacity;
      const spotsLeft = (c) => Math.max(0, c.capacity - c.attendees.length);

      const price = (c) => c.type === 'שיעור פרטי' ? '₪ 150' : '₪ 45';
      const durationMin = (c) => c.type === 'שיעור פרטי' ? 60 : 75;

      const canConfirm = selectedClass != null && !isFull(selectedClass);

      async function handleConfirm() {
        if (!selectedClass) return;
        const currentUser = firebase.auth().currentUser;
        if (currentUser) {
          try {
            const dur = durationMin(selectedClass);
            const userRef = firebase.database().ref('users/' + currentUser.uid);
            const bookingKey = selectedClass.date.replace(/-/g, '') + '_' + selectedClass.time.replace(':', '') + '_' + selectedClass.id;
            await userRef.child('bookings/' + bookingKey).set({
              date: selectedClass.date,
              time: selectedClass.time,
              type: selectedClass.type,
              location: selectedClass.location || '',
              durationMin: dur,
              classId: selectedClass.id,
              createdAt: new Date().toISOString(),
            });
            await userRef.transaction(d => {
              const data = d || {};
              return { ...data, bookingsCount: (data.bookingsCount || 0) + 1 };
            });
            // Add user as attendee on the class (keyed by uid)
            await firebase.database().ref('classes/' + selectedClass.id + '/attendees/' + currentUser.uid).set({
              id: currentUser.uid,
              name: currentUser.displayName || currentUser.email || 'מתרגל',
              email: currentUser.email || '',
              joined: new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }),
            });
          } catch (e) { }
          setConfirmed(true);
        } else {
          setGuestOpen(true);
        }
      }

      async function submitGuest(e) {
        e.preventDefault();
        if (!guestForm.name.trim() || !guestForm.phone.trim() || !selectedClass) return;
        setGuestLoading(true);
        try {
          await firebase.database().ref('pendingBookings').push({
            name: guestForm.name.trim(),
            phone: guestForm.phone.trim(),
            email: guestForm.email.trim(),
            date: selectedClass.date,
            time: selectedClass.time,
            type: selectedClass.type,
            location: selectedClass.location || '',
            classId: selectedClass.id,
            durationMin: durationMin(selectedClass),
            status: 'pending',
            createdAt: new Date().toISOString(),
          });
          setGuestSent(true);
        } catch (e) {
        } finally {
          setGuestLoading(false);
        }
      }

      return (
        <div className="screen">
          <div className="topbar">
            <div className="brand"><span className="dot" /><span>קביעת שיעור</span></div>
            <div className="greet">שלום שלום 🙏</div>
          </div>

          <div className="booking">
            <h1>בחרו שיעור<br /><span style={{ fontStyle: 'italic', color: 'var(--accent-deep)' }}>מלוח השיעורים</span></h1>
            <div className="sub">בחרו יום וסוג שיעור. אשלח אישור בוואטסאפ.</div>

            <div className="week-head">
              <div className="month">{monthLabel}</div>
              <div className="arrows">
                <button aria-label="שבוע קודם" onClick={() => {
                  const d = new Date(anchor); d.setDate(d.getDate() - 7); setAnchor(d);
                }}><IconArrowR size={16} /></button>
                <button aria-label="שבוע הבא" onClick={() => {
                  const d = new Date(anchor); d.setDate(d.getDate() + 7); setAnchor(d);
                }}><IconArrow size={16} /></button>
              </div>
            </div>

            <div className="week-row">
              {week.map((d, i) => {
                const isSel = isSame(d, selected);
                const avail = hasAvail(d);
                const hasAny = allClasses.some(c => c.date === localDateStr(d));
                return (
                  <button
                    key={i}
                    className={`day-pill ${isSel ? 'sel' : ''} ${hasAny ? (avail ? 'avail' : 'full') : ''}`}
                    onClick={() => { setSelected(d); setSelectedClass(null); }}
                    title={!hasAny ? 'אין שיעורים' : !avail ? 'מלא' : ''}
                  >
                    <span className="dn">{HE_DAYS[d.getDay()]}</span>
                    <span className="dd">{d.getDate()}</span>
                    {hasAny && <span className="day-dot" style={{ background: avail ? 'var(--accent)' : 'var(--muted)' }} />}
                  </button>
                );
              })}
            </div>

            {fbLoading ? (
              <div style={{ textAlign: 'center', padding: '32px 0', color: 'var(--muted)' }}>
                טוען שיעורים...
              </div>
            ) : dayClasses.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '32px 0', color: 'var(--muted)' }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>🧘</div>
                אין שיעורים מתוכננים ביום זה
              </div>
            ) : (
              <>
                <div className="slots-label">שיעורים זמינים</div>
                <div className="class-cards">
                  {dayClasses.map(c => {
                    const full = isFull(c);
                    const spots = spotsLeft(c);
                    const sel = selectedClass?.id === c.id;
                    return (
                      <button
                        key={c.id}
                        className={`class-card ${sel ? 'selected' : ''} ${full ? 'full' : ''}`}
                        onClick={() => !full && setSelectedClass(sel ? null : c)}
                        disabled={full}
                      >
                        <div className="cc-time">{c.time}</div>
                        <div className="cc-body">
                          <div className="cc-type">{c.type}</div>
                          <div className="cc-loc">{c.location}</div>
                        </div>
                        <div className="cc-right">
                          <div className="cc-price">{price(c)}</div>
                          <div className={`cc-spots ${spots <= 2 ? 'low' : ''}`}>
                            {full ? 'מלא' : `${spots} מקומות`}
                          </div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </>
            )}

            {canConfirm && (
              <div className="summary">
                <div className="srow"><span className="sk">תאריך</span><span className="sv">{selected.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long' })}</span></div>
                <div className="srow"><span className="sk">שעה</span><span className="sv">{selectedClass.time}</span></div>
                <div className="srow"><span className="sk">שיעור</span><span className="sv">{selectedClass.type}</span></div>
                <div className="srow"><span className="sk">מיקום</span><span className="sv">{selectedClass.location}</span></div>
                <div className="srow"><span className="sk">עלות</span><span className="sv">{price(selectedClass)}</span></div>
              </div>
            )}

            <button className="cta" disabled={!canConfirm} onClick={handleConfirm}>
              {canConfirm ? 'לאישור ההרשמה' : 'בחרו שיעור לסיום ההרשמה'}
            </button>
          </div>

          {/* ── Confirmation modal (logged-in booking) ── */}
          {confirmed && (
            <div className="confirm-veil" onClick={() => setConfirmed(false)}>
              <div className="confirm" onClick={e => e.stopPropagation()}>
                <div className="check"><IconCheck size={28} /></div>
                <h3>השיעור נקבע</h3>
                <p>
                  נתראה {bookLabel.date} בשעה {bookLabel.time}.<br />
                  אישור יישלח אליך בוואטסאפ.
                </p>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', justifyContent: 'center', margin: '12px 0' }}>
                  <a
                    href={googleCalUrl({ date: selected, time: slot, type: bookLabel.typeDisplay, durationMin })}
                    target="_blank" rel="noopener noreferrer"
                    className="cal-btn gcal"
                  >📅 Google Calendar</a>
                  <button
                    className="cal-btn ical"
                    onClick={() => downloadICS(
                      buildICS({ date: selected, time: slot, type: bookLabel.typeDisplay, durationMin }),
                      'yoga-orian.ics'
                    )}
                  >🍎 Apple / iCal</button>
                </div>
                <div className="namaste">נמסטה · אוריאן 🙏</div>
                <button onClick={() => { setConfirmed(false); setSlot(null); }}>תודה</button>
              </div>
            </div>
          )}

          {/* ── Guest booking modal ── */}
          {guestOpen && (
            <div className="confirm-veil" onClick={() => { if (!guestSent) { setGuestOpen(false); } }}>
              <div className="confirm" onClick={e => e.stopPropagation()} style={{ maxWidth: 340 }}>
                {guestSent ? (
                  <>
                    <div className="check"><IconCheck size={28} /></div>
                    <h3>הבקשה נשלחה</h3>
                    <p>בקשתך לשיעור ב-{bookLabel.date} בשעה {slot} נשלחה לאישור.<br />תקבל הודעה לאחר שהמנהל יאשר.</p>
                    <button onClick={() => { setGuestOpen(false); setGuestSent(false); setGuestForm({ name: '', phone: '', email: '' }); setSlot(null); }}>סגור</button>
                  </>
                ) : (
                  <>
                    <h3>הרשמה כאורח/ת</h3>
                    <p style={{ fontSize: 13, color: 'var(--muted)', margin: '4px 0 16px' }}>
                      השיעור יאושר על ידי המנהל. כדי לקבוע שיעורים מיד —{' '}
                      <button style={{ background: 'none', border: 'none', color: 'var(--accent)', textDecoration: 'underline', cursor: 'pointer', padding: 0, font: 'inherit' }}
                        onClick={() => { setGuestOpen(false); /* could go to profile */ }}>
                        הצטרפי / כנסי לחשבון
                      </button>
                    </p>
                    <form onSubmit={submitGuest} style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                      <input
                        placeholder="שם מלא *"
                        value={guestForm.name}
                        onChange={e => setGuestForm(f => ({ ...f, name: e.target.value }))}
                        required
                        style={{ padding: '10px 12px', borderRadius: 10, border: '1px solid var(--hair)', fontFamily: 'var(--font-display)', fontSize: 14 }}
                      />
                      <input
                        placeholder="מספר טלפון *"
                        type="tel"
                        value={guestForm.phone}
                        onChange={e => setGuestForm(f => ({ ...f, phone: e.target.value }))}
                        required
                        style={{ padding: '10px 12px', borderRadius: 10, border: '1px solid var(--hair)', fontFamily: 'var(--font-display)', fontSize: 14 }}
                      />
                      <input
                        placeholder="אימייל (לקבלת אישור)"
                        type="email"
                        value={guestForm.email}
                        onChange={e => setGuestForm(f => ({ ...f, email: e.target.value }))}
                        style={{ padding: '10px 12px', borderRadius: 10, border: '1px solid var(--hair)', fontFamily: 'var(--font-display)', fontSize: 14 }}
                      />
                      <button type="submit" className="cta" disabled={guestLoading} style={{ margin: 0, marginTop: 4 }}>
                        {guestLoading ? 'שולח...' : 'שלח בקשה'}
                      </button>
                    </form>
                    <button style={{ background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', marginTop: 8, fontSize: 13 }}
                      onClick={() => setGuestOpen(false)}>ביטול</button>
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    window.Booking = Booking;

    window.Library = Library;

    // Meditation Room — breathing animation + duration picker + handpan ambient
    function Meditation() {
      const [duration, setDuration] = React.useState(10); // minutes
      const [remaining, setRemaining] = React.useState(10 * 60);
      const [running, setRunning] = React.useState(false);
      const [muted, setMuted] = React.useState(false);
      const [phase, setPhase] = React.useState('שאיפה');
      const engineRef = React.useRef(null);
      const tickRef = React.useRef(null);
      const phaseRef = React.useRef(null);

      React.useEffect(() => {
        engineRef.current = new HandpanEngine();
        // Preload voices for pronunciation (not used here, but good citizen)
        if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
        return () => { try { engineRef.current?.pause(); } catch (e) { } };
      }, []);

      // Countdown
      React.useEffect(() => {
        if (!running) { if (tickRef.current) { clearInterval(tickRef.current); tickRef.current = null; } return; }
        tickRef.current = setInterval(() => {
          setRemaining(r => {
            if (r <= 1) {
              clearInterval(tickRef.current);
              tickRef.current = null;
              setRunning(false);
              try { engineRef.current?.bell(2); } catch (e) { }
              setTimeout(() => { try { engineRef.current?.pause(); } catch (e) { } }, 2000);
              return 0;
            }
            return r - 1;
          });
        }, 1000);
        return () => { if (tickRef.current) clearInterval(tickRef.current); };
      }, [running]);

      // Breath phase cycling in sync with 10s breath animation (5s in, 5s out)
      React.useEffect(() => {
        if (!running) { if (phaseRef.current) { clearInterval(phaseRef.current); phaseRef.current = null; } return; }
        setPhase('שאיפה');
        let inhale = true;
        phaseRef.current = setInterval(() => {
          inhale = !inhale;
          setPhase(inhale ? 'שאיפה' : 'נשיפה');
        }, 5000);
        return () => { if (phaseRef.current) clearInterval(phaseRef.current); };
      }, [running]);

      function pickDuration(m) {
        setDuration(m);
        setRemaining(m * 60);
        if (running) {
          setRunning(false);
          try { engineRef.current?.pause(); } catch (e) { }
        }
      }

      async function togglePlay() {
        if (running) {
          setRunning(false);
          try { engineRef.current?.pause(); } catch (e) { }
        } else {
          if (remaining === 0) setRemaining(duration * 60);
          setRunning(true);
          try { await engineRef.current?.play(); } catch (e) { }
        }
      }

      function reset() {
        setRunning(false);
        setRemaining(duration * 60);
        try { engineRef.current?.pause(); } catch (e) { }
      }

      function toggleMute() {
        const m = !muted;
        setMuted(m);
        engineRef.current?.setMuted(m);
      }

      const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
      const ss = String(remaining % 60).padStart(2, '0');

      return (
        <div className="screen medi">
          <div className="topbar">
            <div className="brand"><span className="dot" /><span>חדר המדיטציה</span></div>
            <div className="greet">ॐ שאנטי</div>
          </div>

          <div className="medi-head">
            <div className="eyebrow">נשום · עצום · היה</div>
            <h1>רגע לעצמך</h1>
            <p>let the breath lead</p>
          </div>

          <div className="breath-wrap">
            <div className={`breath ${running ? 'running' : ''}`}>
              <div className="ring r1" />
              <div className="ring r2" />
              <div className="ring r3" />
              <div className="orb" />
            </div>
            <div className="breath-label">
              {running ? phase : 'מוכנה?'}
              <small>{running ? (phase === 'שאיפה' ? 'inhale' : 'exhale') : 'press to begin'}</small>
            </div>
          </div>

          <div className="time-display">{mm}:{ss}</div>

          <div className="durations">
            {[5, 10, 20].map(m => (
              <button key={m} className={`duration ${duration === m ? 'on' : ''}`} onClick={() => pickDuration(m)}>
                {m} דקות
              </button>
            ))}
          </div>

          <div className="medi-controls">
            <button className={`medi-btn mute ${muted ? 'off' : ''}`} onClick={toggleMute} aria-label={muted ? 'השמע' : 'השתק'}>
              {muted ? <IconMute size={20} /> : <IconSound size={20} />}
            </button>
            <button className="medi-btn primary" onClick={togglePlay} aria-label={running ? 'עצור' : 'התחל'}>
              {running ? <IconPause size={24} /> : <IconPlay size={24} />}
            </button>
            <button className="medi-btn" onClick={reset} aria-label="אפס">
              <IconBack size={18} />
            </button>
          </div>

          <div className="sound-label">צלילי הנדפאן ברקע</div>
        </div>
      );
    }

    window.Meditation = Meditation;

    const DEFAULT_CLASSES = [
      {
        id: 'c1', type: 'האטה בוקר', date: '2026-04-24', time: '07:00', location: 'אברהם דנינו 12', capacity: 12, attendees: [

    function Dashboard({ onExit }) {
      const [view, setView] = React.useState('overview'); // overview | classes | add | students | pending
      const [classes, setClasses] = React.useState([]);
      const [students, setStudents] = React.useState([]); // real Firebase users
      const [dbLoading, setDbLoading] = React.useState(true);
      const [editingId, setEditingId] = React.useState(null);
      const [rosterId, setRosterId] = React.useState(null);
      const [toast, setToast] = React.useState(null);

      // Load classes and students from Firebase
      React.useEffect(() => {
        const classRef = firebase.database().ref('classes');
        classRef.on('value', snap => {
          const data = snap.val() || {};
          const list = Object.entries(data).map(([key, val]) => ({
            id: key,
            ...val,
            attendees: val.attendees ? Object.values(val.attendees) : [],
          }));
          // Seed with DEFAULT_CLASSES only on first load if DB is empty
          if (Object.keys(data).length === 0) {
            DEFAULT_CLASSES.forEach(({ id, attendees, ...rest }) => {
              classRef.child(id).set({ ...rest, attendees: {} });
            });
          }
          setClasses(list.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)));
          setDbLoading(false);
        });

        const userRef = firebase.database().ref('users');
        userRef.on('value', snap => {
          const data = snap.val() || {};
          setStudents(Object.entries(data).map(([uid, val]) => ({ uid, ...val })));
        });

        return () => { classRef.off(); userRef.off(); };
      }, []);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 3200);
      };

      // === derived stats (from real Firebase data) ===
      const totalStudents = students.length;
      const totalBookings = students.reduce((s, u) => s + (u.bookingsCount || 0), 0);
      const totalSignups = classes.reduce((s, c) => s + c.attendees.length, 0);
      const totalCapacity = classes.reduce((s, c) => s + c.capacity, 0);
      const occupancy = totalCapacity ? Math.round((totalSignups / totalCapacity) * 100) : 0;
      const weeklyRevenue = students.reduce((s, u) => s + (u.bookingsCount || 0) * 175, 0); // avg price

      // Heatmap: classes per weekday
      const dayLoad = [0, 0, 0, 0, 0, 0, 0];
      classes.forEach(c => {
        const d = new Date(c.date);
        dayLoad[d.getDay()] += c.attendees.length;
      });

      // Upcoming sorted
      const sorted = [...classes].sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

      // === mutations (all write to Firebase) ===
      const cancelClass = async (id) => {
        if (!confirm('לבטל את השיעור? ההרשמות יבוטלו וישלח עדכון לתלמידות.')) return;
        await firebase.database().ref('classes/' + id).remove();
        showToast('השיעור בוטל · עדכון נשלח');
      };
      const saveEdit = async (id, patch) => {
        await firebase.database().ref('classes/' + id).update(patch);
        setEditingId(null);
        showToast('השינויים נשמרו');
      };
      const addClass = async (data) => {
        await firebase.database().ref('classes').push({ attendees: {}, ...data });
        setView('classes');
        showToast('שיעור חדש נוסף ללוח');
      };
      const removeStudent = async (classId, userId) => {
        await firebase.database().ref('classes/' + classId + '/attendees/' + userId).remove();
        showToast('המשתתפ הוסר');
      };

      const activeClass = classes.find(c => c.id === rosterId);
      const editingClass = classes.find(c => c.id === editingId);

      return (
        <div className="dash">
          <DashHeader onExit={onExit} />

          <nav className="dash-nav">
            {[
              { id: 'overview', name: 'סקירה', Icon: IconSpark },
              { id: 'classes', name: 'שיעורים', Icon: IconCal },
              { id: 'add', name: 'הוסף', Icon: IconPlus },
              { id: 'students', name: 'תלמידות', Icon: IconUsers },
              { id: 'nav', name: 'ניווט', Icon: IconNav },
              { id: 'pending', name: 'אורחים', Icon: IconUsers },
            ].map(t => (
              <button key={t.id} className={view === t.id ? 'on' : ''} onClick={() => setView(t.id)}>
                <t.Icon size={15} />
                <span>{t.name}</span>
              </button>
            ))}
          </nav>

          <div className="dash-body">
            {view === 'overview' && (
              <Overview
                stats={{ totalStudents, totalBookings, totalSignups, occupancy, weeklyRevenue, dayLoad }}
                classes={sorted.slice(0, 3)}
                onOpen={() => setView('classes')}
              />
            )}
            {view === 'classes' && (
              <ClassList
                classes={sorted}
                onCancel={cancelClass}
                onEdit={setEditingId}
                onRoster={setRosterId}
              />
            )}
            {view === 'add' && (
              <AddClassForm onAdd={addClass} onCancel={() => setView('classes')} />
            )}
            {view === 'students' && (
              <StudentList students={students} />
            )}
            {view === 'nav' && (
              <NavManager />
            )}
            {view === 'pending' && (
              <PendingBookings />
            )}
          </div>

          {editingClass && (
            <EditClassModal
              cls={editingClass}
              onSave={(patch) => saveEdit(editingClass.id, patch)}
              onClose={() => setEditingId(null)}
            />
          )}
          {activeClass && (
            <RosterModal
              cls={activeClass}
              onRemove={(uid) => removeStudent(activeClass.id, uid)}
              onClose={() => setRosterId(null)}
            />
          )}
          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    }

    // ── Pending guest bookings (admin view) ─────────────────────────────────
    function PendingBookings() {
      const [items, setItems] = React.useState([]);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        const ref = firebase.database().ref('pendingBookings');
        ref.on('value', snap => {
          const data = snap.val() || {};
          const list = Object.entries(data).map(([key, val]) => ({ key, ...val }));
          list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
          setItems(list);
          setLoading(false);
        });
        return () => ref.off();
      }, []);

      async function approve(key, item) {
        await firebase.database().ref('pendingBookings/' + key + '/status').set('approved');
        // Optionally send email via mailto link
        if (item.email) {
          window.open(`mailto:${item.email}?subject=${encodeURIComponent('שיעור יוגה אושר · אוריאן')}&body=${encodeURIComponent(`שלום ${item.name},\n\nהשיעור ב-${item.date} בשעה ${item.time} אושר.\n\nנתראה! 🙏\nאוריאן`)}`);
        }
      }

      async function decline(key) {
        await firebase.database().ref('pendingBookings/' + key + '/status').set('declined');
      }

      if (loading) return <div style={{ padding: 24, color: 'var(--muted)' }}>טוען...</div>;
      if (!items.length) return (
        <div style={{ padding: 24, textAlign: 'center', color: 'var(--muted)' }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>✅</div>
          אין בקשות ממתינות
        </div>
      );

      const statusLabel = { pending: '⏳ ממתין', approved: '✅ אושר', declined: '❌ נדחה' };
      const statusColor = { pending: '#f59e0b', approved: '#22c55e', declined: '#ef4444' };

      return (
        <div style={{ padding: '16px 0' }}>
          <div style={{ padding: '0 16px 12px', fontWeight: 700, fontSize: 16 }}>בקשות אורחים · {items.filter(i => i.status === 'pending').length} ממתינות</div>
          {items.map(item => (
            <div key={item.key} style={{
              margin: '0 16px 12px', padding: '14px 16px', borderRadius: 14,
              background: 'var(--surface)', border: '1px solid var(--hair)',
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{item.name}</div>
                  <div style={{ color: 'var(--muted)', fontSize: 12 }}>{item.phone}{item.email ? ' · ' + item.email : ''}</div>
                </div>
                <span style={{ fontSize: 12, fontWeight: 600, color: statusColor[item.status] || '#888' }}>
                  {statusLabel[item.status] || item.status}
                </span>
              </div>
              <div style={{ fontSize: 13, color: 'var(--ink)', marginBottom: 10 }}>
                {item.type} · {item.date} {item.time}
              </div>
              {item.status === 'pending' && (
                <div style={{ display: 'flex', gap: 8 }}>
                  <button
                    onClick={() => approve(item.key, item)}
                    style={{ flex: 1, padding: '9px', borderRadius: 999, border: 'none', background: '#22c55e', color: '#fff', fontWeight: 700, cursor: 'pointer', fontSize: 13 }}>
                    אשר
                  </button>
                  <button
                    onClick={() => decline(item.key)}
                    style={{ flex: 1, padding: '9px', borderRadius: 999, border: 'none', background: '#ef444420', color: '#ef4444', fontWeight: 700, cursor: 'pointer', fontSize: 13 }}>
                    דחה
                  </button>
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

      return days[d.getDay()];

    function formatLongDate(dateStr) {
      const d = new Date(dateStr);

    // ── Nav Manager ────────────────────────────────────────────────────────
    function NavManager() {
      const [hidden, setHidden] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem('yo-hidden-tabs') || '[]'); } catch { return []; }
      });

      // Subscribe to Firebase config so NavManager UI reflects the live global state
      React.useEffect(() => {
        const ref = firebase.database().ref('config/hiddenTabs');
        ref.on('value', snap => {
          const val = snap.val();
          const list = Array.isArray(val) ? val : [];
          setHidden(list);
          try { localStorage.setItem('yo-hidden-tabs', JSON.stringify(list)); } catch { }
        });
        return () => ref.off();
      }, []);

      async function toggle(id) {
        setHidden(prev => {
          const next = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
          const visible = ALL_TABS.filter(t => !next.includes(t.id));
          if (visible.length < 2) return prev;
          // Write to Firebase (broadcasts to ALL connected clients)
          firebase.database().ref('config/hiddenTabs').set(next);
          return next;
        });
      }

      async function reset() {
        await firebase.database().ref('config/hiddenTabs').set([]);
      }

      return (
        <div className="nav-manager">
          <div className="nm-title">ניהול ניווט</div>
          <div className="nm-sub">הפעילי או השביתי לשוניות בתפריט הניווט של האפליקציה.</div>

          <div className="nm-list">
            {ALL_TABS.map(t => {
              const isHidden = hidden.includes(t.id);
              const isProtected = t.id === 'home'; // home is always visible
              return (
                <div key={t.id} className={`nm-row ${isHidden ? 'off' : ''}`}>
                  <div className="nm-icon">
                    <t.Icon size={18} />
                  </div>
                  <div className="nm-label">
                    <div className="nm-name">{t.name}</div>
                    <div className="nm-state">{isProtected ? 'חובה · תמיד מוצג' : isHidden ? 'מוסתר' : 'מוצג'}</div>
                  </div>
                  <button
                    className={`nm-toggle ${isHidden ? '' : 'on'}`}
                    onClick={() => toggle(t.id)}
                    disabled={isProtected}
                    aria-label={isHidden ? 'הצגה' : 'הסתרה'}
                  >
                    {isHidden ? <IconEyeOff size={16} /> : <IconEye size={16} />}
                    <span>{isHidden ? 'הצגה' : 'הסתרה'}</span>
                  </button>
                </div>
              );
            })}
          </div>

          <button className="nm-reset" onClick={reset}>
            איפוס — הצגת כל הלשוניות
          </button>

          <div className="nm-note">
            שינויים מיידיים · נשמרים גם לאחר רענון הדף
          </div>
        </div>
      );
    }

    Object.assign(window, { Dashboard, NavManager, IconPlus, IconPencil, IconTrash, IconPin, IconTrendUp, IconSearch, IconNav, IconEye, IconEyeOff });

    // Tweaks panel — theme + layout density + instructor-mode toggle

    window.Tweaks = Tweaks;

    // Main app shell: routing, theme persistence, Tweaks handshake
    // All possible tabs — order = display order; admin can hide any of them
    const ALL_TABS = [
      { id: 'home', name: 'בית', Icon: IconHome },
      { id: 'booking', name: 'קביעת תור', Icon: IconCal },
      { id: 'profile', name: 'פרופיל', Icon: ProfileTabIcon }, // center
      { id: 'library', name: 'תנוחות', Icon: IconLib },
      { id: 'meditation', name: 'מדיטציה', Icon: IconMedi },
    ];

    function getVisibleTabs() {
      try {
        const hidden = JSON.parse(localStorage.getItem('yo-hidden-tabs') || '[]');
        return ALL_TABS.filter(t => !hidden.includes(t.id));
      } catch { return ALL_TABS; }
    }

    // TABS is a computed value — components that need reactivity use getVisibleTabs() in state
    const TABS = getVisibleTabs();

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "earth",
      "layout": "normal",
      "heroName": "יוגה עם אוריאן"
    }/*EDITMODE-END*/;

    function App() {
      // Mode: student (default) or instructor dashboard
      const [mode, setMode] = React.useState(() => {
        try { return localStorage.getItem('yo-mode') || 'student'; } catch { return 'student'; }
      });
      // Active tab persisted across refresh
      const [tab, setTab] = React.useState(() => {
        try { return localStorage.getItem('yo-tab') || 'home'; } catch { return 'home'; }
      });
      // Reactive visible tabs (admin can hide/show)
      const [visibleTabs, setVisibleTabs] = React.useState(getVisibleTabs);

      // Subscribe to Firebase config/hiddenTabs — applies to ALL users in real time
      React.useEffect(() => {
        const ref = firebase.database().ref('config/hiddenTabs');
        ref.on('value', snap => {
          const val = snap.val();
          const hidden = Array.isArray(val) ? val : [];
          try { localStorage.setItem('yo-hidden-tabs', JSON.stringify(hidden)); } catch { }
          setVisibleTabs(ALL_TABS.filter(t => !hidden.includes(t.id)));
        });
        // Also keep local event fallback for instant UI response
        const onNav = () => setVisibleTabs(getVisibleTabs());
        window.addEventListener('yo-nav-changed', onNav);
        return () => {
          ref.off();
          window.removeEventListener('yo-nav-changed', onNav);
        };
      }, []);

      // Listen for mode switch events (e.g. from admin button in Profile)
      React.useEffect(() => {
        const onSwitch = (e) => setMode(e.detail);
        window.addEventListener('yo-switch-mode', onSwitch);
        return () => window.removeEventListener('yo-switch-mode', onSwitch);
      }, []);
      const [tweaks, _setTweaks] = React.useState(() => {
        try {
          const saved = JSON.parse(localStorage.getItem('yo-tweaks') || '{}');
          return { ...TWEAK_DEFAULTS, ...saved };
        } catch { return TWEAK_DEFAULTS; }
      });
      const [tweaksOpen, setTweaksOpen] = React.useState(false);

      const setTweaks = (patch) => {
        _setTweaks(prev => {
          const next = { ...prev, ...patch };
          try { localStorage.setItem('yo-tweaks', JSON.stringify(next)); } catch { }
          try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*'); } catch { }
          return next;
        });
      };

      React.useEffect(() => { applyTheme(tweaks.theme); }, [tweaks.theme]);
      React.useEffect(() => { try { localStorage.setItem('yo-tab', tab); } catch { } }, [tab]);
      React.useEffect(() => { try { localStorage.setItem('yo-mode', mode); } catch { } }, [mode]);

      React.useEffect(() => {
        function onMsg(e) {
          const t = e?.data?.type;
          if (t === '__activate_edit_mode') setTweaksOpen(true);
          else if (t === '__deactivate_edit_mode') setTweaksOpen(false);
        }
        window.addEventListener('message', onMsg);
        try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch { }
        return () => window.removeEventListener('message', onMsg);
      }, []);

      // Instructor mode — render dashboard at full-bleed
      if (mode === 'instructor') {
        return (
          <>
            <div className="bg-stage" />
            <div className="shell" data-layout={tweaks.layout}>
              <Dashboard onExit={() => setMode('student')} />
              {tweaksOpen && (
                <Tweaks
                  tweaks={tweaks} setTweaks={setTweaks}
                  mode={mode} setMode={setMode}
                  onClose={() => setTweaksOpen(false)}
                />
              )}
            </div>
          </>
        );
      }

      return (
        <>
          <div className="bg-stage" />
          <div className="shell" data-layout={tweaks.layout}>
            <HeroNameBridge value={tweaks.heroName} />

            {/* Always render all screens; hide inactive ones so Meditation audio persists */}
            <div style={{ display: tab === 'home' ? 'contents' : 'none' }}>
              <Home go={setTab} theme={tweaks.theme} />
            </div>
            <div style={{ display: tab === 'booking' ? 'contents' : 'none' }}>
              <Booking go={setTab} />
            </div>
            <div style={{ display: tab === 'library' ? 'contents' : 'none' }}>
              <Library />
            </div>
            <div style={{ display: tab === 'meditation' ? 'contents' : 'none' }}>
              <Meditation />
            </div>
            <div style={{ display: tab === 'profile' ? 'contents' : 'none' }}>
              <Profile />
            </div>

            <nav className="tabbar" aria-label="ניווט ראשי"
              style={{ gridTemplateColumns: `repeat(${visibleTabs.length}, 1fr)` }}>
              {visibleTabs.map(({ id, name, Icon }) => (
                <button key={id} className={tab === id ? 'active' : ''} onClick={() => setTab(id)}>
                  <span className="ti"><Icon size={18} active={tab === id} /></span>
                  <span>{name}</span>
                </button>
              ))}
            </nav>

            {tweaksOpen && (
              <Tweaks
                tweaks={tweaks} setTweaks={setTweaks}
                mode={mode} setMode={setMode}
                onClose={() => setTweaksOpen(false)}
              />
            )}
          </div>
        </>
      );
    }

    function HeroNameBridge({ value }) {
      React.useEffect(() => {
        const el = document.querySelector('.home-hero h1');
        if (!el) return;
        if (!value || value === TWEAK_DEFAULTS.heroName) return;
        el.innerHTML = value.replace(/\n/g, '<br/>');
      }, [value]);
      return null;
    }

      return (
        <svg width="16" height="18" viewBox="0 0 814 1000" fill="currentColor" stroke="none">
          <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105-42.6-154.5-131.7C179.9 752.8 142.2 661.7 142.2 575c0-146.4 95.2-223.7 187.5-223.7 67.5 0 116.5 43.3 156.5 43.3 38.3 0 97.1-45.8 172.8-45.8zm-141-73.4c30.5-36.7 52.6-87.9 52.6-139.2 0-7.1-.6-14.3-1.9-20.1-49.8 1.9-108.9 33.7-144.6 75.7-27.7 31.9-54.5 83.1-54.5 135.1 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 44.5 0 100-29.9 133-70.9z" />
        </svg>
      );
    }

    // ── Extra icons needed by Profile ─────────────────────────────────────
    const IconLock = (p) => (
      <Icon {...p}>
        <rect x="5" y="11" width="14" height="10" rx="2" transform="translate(-2 0)" />
        <path d="M8 11V7a4 4 0 0 1 8 0v4" />
      </Icon>
    );

    // ── Profile tab avatar (shows user photo/initial when logged in) ───────
    function ProfileTabIcon({ size = 18, active }) {
      const [photoURL, setPhotoURL] = React.useState(null);
      const [initial, setInitial] = React.useState(null);

      React.useEffect(() => {
        try {
          return firebase.auth().onAuthStateChanged(u => {
            setPhotoURL(u?.photoURL || null);
            const n = u?.displayName || u?.email || '';
            setInitial(n ? n.charAt(0).toUpperCase() : null);
          });
        } catch { return undefined; }
      }, []);

      if (photoURL) {
        return (
          <span className="tab-profile-avatar">
            <img src={photoURL} referrerPolicy="no-referrer" alt="" />
          </span>
        );
      }
      if (initial) {
        return <span className="tab-profile-avatar">{initial}</span>;
      }
      return <IconUser size={size} />;
    }

    // ── Profile screen ─────────────────────────────────────────────────────
    function Profile() {
      const [user, setUser] = React.useState(undefined); // undefined = auth loading
      const [mode, setMode] = React.useState('login');   // 'login' | 'register'
      const [form, setForm] = React.useState({ name: '', email: '', password: '', gender: 'female' });
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState('');
      const [stats, setStats] = React.useState(null);
      const dbRef = React.useRef(null);

      // Auth state listener
      React.useEffect(() => {
        let unsub;
        try {
          unsub = firebase.auth().onAuthStateChanged(async u => {
            setUser(u || null);
            if (u) {
              recordSession(u);
              listenStats(u.uid);
            } else {
              if (dbRef.current) { dbRef.current.off(); dbRef.current = null; }
              setStats(null);
            }
          });
        } catch (e) { setUser(null); }
        return () => {
          if (unsub) unsub();
          if (dbRef.current) { dbRef.current.off(); dbRef.current = null; }
        };
      }, []);

      function listenStats(uid) {
        if (dbRef.current) dbRef.current.off();
        const ref = firebase.database().ref('users/' + uid);
        dbRef.current = ref;
        ref.on('value', snap => setStats(snap.val()));
      }

      function recordSession(u) {
        try {
          firebase.database().ref('users/' + u.uid).transaction(data => {
            const d = data || {};
            const today = new Date().toISOString().slice(0, 10);
            const lastDay = (d.lastVisit || '').slice(0, 10);
            return {
              ...d,
              name: d.name || u.displayName || u.email || 'מתרגלת',
              email: u.email || d.email || '',
              photoURL: u.photoURL || d.photoURL || null,
              sessions: today !== lastDay ? (d.sessions || 0) + 1 : (d.sessions || 1),
              lastVisit: new Date().toISOString(),
            };
          });
        } catch (e) { }
      }

      const setF = (k, v) => setForm(f => ({ ...f, [k]: v }));

      async function doRegister(e) {
        e.preventDefault();
        if (!form.name.trim()) { setError('אנא הכניסי שם מלא'); return; }
        setLoading(true); setError('');
        try {
          const cred = await firebase.auth().createUserWithEmailAndPassword(form.email, form.password);
          await cred.user.updateProfile({ displayName: form.name.trim() });
          // Write name + gender immediately so DB has it
          await firebase.database().ref('users/' + cred.user.uid).update({ name: form.name.trim(), gender: form.gender });
        } catch (err) {
          setError(hebrewAuthError(err.code));
        } finally { setLoading(false); }
      }

      async function doLogin(e) {
        e.preventDefault();
        setLoading(true); setError('');
        try {
          await firebase.auth().signInWithEmailAndPassword(form.email, form.password);
        } catch (err) {
          setError(hebrewAuthError(err.code));
        } finally { setLoading(false); }
      }

      async function doGoogle() {
        setLoading(true); setError('');
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: 'select_account' });
          await firebase.auth().signInWithPopup(provider);
        } catch (err) {
          if (err.code !== 'auth/cancelled-popup-request') setError(hebrewAuthError(err.code));
        } finally { setLoading(false); }
      }

      async function doApple() {
        setLoading(true); setError('');
        try {
          const provider = new firebase.auth.OAuthProvider('apple.com');
          provider.addScope('email');
          provider.addScope('name');
          await firebase.auth().signInWithPopup(provider);
        } catch (err) {
          if (err.code !== 'auth/cancelled-popup-request' && err.code !== 'auth/popup-closed-by-user')
            setError(hebrewAuthError(err.code));
        } finally { setLoading(false); }
      }

      async function doSignOut() {
        if (dbRef.current) { dbRef.current.off(); dbRef.current = null; }
        await firebase.auth().signOut();
        setStats(null); setForm({ name: '', email: '', password: '' }); setError('');
      }

      // ── Loading state ──
      if (user === undefined) {
        return (
          <div className="screen">
            <div className="topbar">
              <div className="brand"><span className="dot" /><span>פרופיל</span></div>
            </div>
            <div className="profile-loading"><div className="pload-orb" /></div>
          </div>
        );
      }

      // ── Not logged in ──
      if (!user) {
        return (
          <div className="screen">
            <div className="topbar">
              <div className="brand"><span className="dot" /><span>פרופיל</span></div>
            </div>
            <div className="auth-wrap">
              <div className="auth-avatar-guest">
                <IconUser size={42} />
              </div>
              <div className="auth-title">
                {mode === 'login' ? 'ברוכה הבאה חזרה ✨' : 'הצטרפי אלינו 🌸'}
              </div>
              <div className="auth-sub">
                {mode === 'login'
                  ? 'היכנסי כדי לראות את ההתקדמות, השיעורים הקרובים וזמן האימון שלך'
                  : 'צרי חשבון ועקבי אחרי המסע שלך ביוגה עם אוריאן'}
              </div>

              <div className="social-btns">
                <button className="social-btn google" onClick={doGoogle} disabled={loading}>
                  <GoogleSVG />
                  <span>Google</span>
                </button>
                <button className="social-btn apple" onClick={doApple} disabled={loading}>
                  <AppleSVG />
                  <span>Apple</span>
                </button>
              </div>

              <div className="auth-or"><span>או</span></div>

              <form className="auth-form" onSubmit={mode === 'login' ? doLogin : doRegister}>
                {mode === 'register' && (
                  <>
                    <div className="auth-field">
                      <span className="auth-field-icon"><IconUser size={15} /></span>
                      <input
                        placeholder="שם מלא"
                        value={form.name}
                        onChange={e => setF('name', e.target.value)}
                        autoComplete="name"
                        required
                      />
                    </div>
                    <div className="gender-toggle" style={{ display: 'flex', gap: 8, marginBottom: 2 }}>
                      <button
                        type="button"
                        className={`gender-pill ${form.gender === 'female' ? 'on' : ''}`}
                        onClick={() => setF('gender', 'female')}
                      >נקבה</button>
                      <button
                        type="button"
                        className={`gender-pill ${form.gender === 'male' ? 'on' : ''}`}
                        onClick={() => setF('gender', 'male')}
                      >זכר</button>
                    </div>
                  </>
                )}
                <div className="auth-field">
                  <span className="auth-field-icon" style={{ fontFamily: 'monospace' }}>@</span>
                  <input
                    type="email" placeholder="כתובת אימייל"
                    value={form.email} onChange={e => setF('email', e.target.value)}
                    autoComplete="email" required
                  />
                </div>
                <div className="auth-field">
                  <span className="auth-field-icon"><IconLock size={15} /></span>
                  <input
                    type="password" placeholder="סיסמה · לפחות 6 תווים"
                    value={form.password} onChange={e => setF('password', e.target.value)}
                    autoComplete={mode === 'login' ? 'current-password' : 'new-password'}
                    required minLength={6}
                  />
                </div>
                {error && <div className="auth-error">{error}</div>}
                <button type="submit" className="auth-submit" disabled={loading}>
                  {loading ? '⏳ רגע...' : mode === 'login' ? 'כניסה' : 'יצירת חשבון'}
                </button>
              </form>

              <button className="auth-mode-toggle" onClick={() => { setMode(m => m === 'login' ? 'register' : 'login'); setError(''); }}>
                {mode === 'login' ? 'אין לך חשבון עדיין? הצטרפי ←' : 'יש לך חשבון? כניסה ←'}
              </button>
            </div>
          </div>
        );
      }

      // ── Logged in ──
      const isMale = stats?.gender === 'male';
      // gt(female, male) — gender text helper
      const gt = (female, male) => isMale ? male : female;

      const displayName = user.displayName || stats?.name || user.email?.split('@')[0] || gt('מתרגלת', 'מתרגל');
      const initial = displayName.charAt(0).toUpperCase();
      const sessions = stats?.sessions || 1;
      const bookingsCount = stats?.bookingsCount || 0;
      const rankScore = sessions + bookingsCount * 2;
      const totalMin = (sessions * 45) + (bookingsCount * 60);
      const totalStr = totalMin >= 60
        ? `${Math.floor(totalMin / 60)}ש׳${totalMin % 60 > 0 ? ' ' + totalMin % 60 + 'ד׳' : ''}`
        : `${totalMin}ד׳`;
      const streak = Math.min(sessions, 7);

      const lastVisit = stats?.lastVisit
        ? new Date(stats.lastVisit).toLocaleDateString('he-IL', {
          weekday: 'long', day: 'numeric', month: 'long',
          hour: '2-digit', minute: '2-digit',
        })
        : '—';

      // Rank from combined score
      let rankLabel;
      if (rankScore < 5) rankLabel = gt('🌱 מתחילה', '🌱 מתחיל');
      else if (rankScore < 15) rankLabel = gt('🌿 מתרגלת', '🌿 מתרגל');
      else if (rankScore < 35) rankLabel = gt('🌳 מתקדמת', '🌳 מתקדם');
      else rankLabel = gt('🦋 אמנית', '🦋 אמן');

      // Upcoming bookings from Firebase (local date comparison)
      const todayStr = [
        new Date().getFullYear(),
        String(new Date().getMonth() + 1).padStart(2, '0'),
        String(new Date().getDate()).padStart(2, '0'),
      ].join('-');
      const nowTime = String(new Date().getHours()).padStart(2, '0') + ':' + String(new Date().getMinutes()).padStart(2, '0');

      let upcomingBookings = [];
      try {
        const bookingsObj = stats?.bookings || {};
        upcomingBookings = Object.values(bookingsObj)
          .filter(b => b.date && b.time && (
            b.date > todayStr || (b.date === todayStr && b.time >= nowTime)
          ))
          .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
      } catch { }
      const nextLesson = upcomingBookings.length > 0
        ? (() => {
          const n = upcomingBookings[0];
          const d = new Date(n.date + 'T00:00:00');
          return `${n.type} · ${d.toLocaleDateString('he-IL', { weekday: 'short', day: 'numeric', month: 'long' })} ${n.time}`;
        })()
        : gt('טרם נקבע שיעור הבא', 'טרם נקבע שיעור הבא');

      return (
        <div className="screen">
          <div className="topbar">
            <div className="brand"><span className="dot" /><span>הפרופיל שלי</span></div>
            <button className="signout-pill" onClick={doSignOut}>יציאה</button>
          </div>

          <div className="profile-hero-wrap">
            <div className="profile-avatar-large">
              {user.photoURL
                ? <img src={user.photoURL} alt={displayName} referrerPolicy="no-referrer" />
                : <span>{initial}</span>
              }
            </div>
            <div className="profile-display-name">{displayName}</div>
            <div className="profile-email-pill">{user.email}</div>
            {stats?.admin && (
              <button
                className="admin-badge-btn"
                onClick={() => window.dispatchEvent(new CustomEvent('yo-switch-mode', { detail: 'instructor' }))}
              >⚙️ ממשק ניהול</button>
            )}
          </div>

          <div className="profile-stats-strip">
            <div className="pss-item">
              <div className="pss-num">{sessions}</div>
              <div className="pss-lbl">כניסות לאפליקציה</div>
            </div>
            <div className="pss-sep" />
            <div className="pss-item">
              <div className="pss-num">{bookingsCount}</div>
              <div className="pss-lbl">שיעורים שנרשמתי</div>
            </div>
            <div className="pss-sep" />
            <div className="pss-item">
              <div className="pss-num">{totalStr}</div>
              <div className="pss-lbl">זמן אימון כולל</div>
            </div>
          </div>

          <div className="profile-info-cards">
            <div className="pic-card highlight">
              <div className="pic-icon"><IconCal size={18} /></div>
              <div>
                <div className="pic-label">{gt('השיעור הבא שלך', 'השיעור הבא שלך')}</div>
                <div className="pic-val">{nextLesson}</div>
              </div>
            </div>
            <div className="pic-card">
              <div className="pic-icon"><IconClock size={18} /></div>
              <div>
                <div className="pic-label">כניסה אחרונה</div>
                <div className="pic-val">{lastVisit}</div>
              </div>
            </div>
            <div className="pic-card">
              <div className="pic-icon"><IconMedi size={18} /></div>
              <div>
                <div className="pic-label">{gt('המלצה לתרגול היום', 'המלצה לתרגול היום')}</div>
                <div className="pic-val">
                  {rankScore < 5 ? gt('תנוחת ההר · נשימה ומיקוד', 'תנוחת ההר · נשימה ומיקוד') :
                    rankScore < 15 ? 'וויניאסה זרימה · 30 דקות' :
                      gt('מדיטציה מתקדמת · 20 דקות', 'מדיטציה מתקדמת · 20 דקות')}
                </div>
              </div>
            </div>
            <div className="pic-card">
              <div className="pic-icon"><IconLeaf size={18} /></div>
              <div>
                <div className="pic-label">רמת תרגול</div>
                <div className="pic-val">{rankLabel}</div>
              </div>
            </div>
          </div>

          {/* Upcoming booked sessions list */}
          {upcomingBookings.length > 0 && (
            <div style={{ padding: '0 18px 24px' }}>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10 }}>השיעורים הקרובים שלי</div>
              {upcomingBookings.map((b, i) => {
                const d = new Date(b.date + 'T00:00:00');
                const dateLabel = d.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long' });
                return (
                  <div key={i} style={{
                    display: 'flex', alignItems: 'center', gap: 12,
                    padding: '12px 14px', borderRadius: 14, marginBottom: 8,
                    background: 'var(--surface)', border: '1px solid var(--hair)',
                  }}>
                    <div style={{
                      width: 42, height: 42, borderRadius: 10, flexShrink: 0,
                      background: 'linear-gradient(135deg, var(--cta-a), var(--cta-b))',
                      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                      color: '#fff', fontSize: 11, fontWeight: 700, lineHeight: 1.2,
                    }}>
                      <span>{d.getDate()}</span>
                      <span>{HE_MONTHS_SHORT[d.getMonth()]}</span>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{b.type}</div>
                      <div style={{ fontSize: 12, color: 'var(--muted)' }}>{dateLabel} · {b.time}</div>
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--accent)', fontWeight: 700, background: 'var(--accent-faint)', padding: '3px 10px', borderRadius: 999 }}>מאושר</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    window.Profile = Profile;
    window.ProfileTabIcon = ProfileTabIcon;

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
