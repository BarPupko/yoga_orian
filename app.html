<!doctype html>
<html lang="he" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>יוגה עם אוריאן</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100..900&display=swap" rel="stylesheet">
  <style>
    /* ======================================================================
   יוגה עם אוריאן — Calm, earth-toned, handpan-inspired
   ====================================================================== */

    :root {
      /* Base palette */
      --ivory: #F5EEF5;
      --ivory-2: #EDE5F0;
      --ivory-3: #E0D4E8;
      --ink: #1E1830;
      --ink-soft: #3D3557;
      --ink-mute: #7B6E9A;
      --paper: #FDFAFF;
      --paper-2: #F7F2FC;
      --hair: rgba(90, 60, 130, 0.12);
      --hair-2: rgba(90, 60, 130, 0.06);

      /* Theme: EARTH (default) — rose + lavender */
      --accent: #C45C8A;
      --accent-2: #8B6BAF;
      --accent-deep: #7A3870;
      --accent-wash: #F5D8E8;
      --accent-wash-2: #E8D8F5;
      --surface-grad-1: #FBF0F7;
      --surface-grad-2: #F0E0F5;
      --hero-grad-a: #FFDDE9;
      --hero-grad-b: #EDD6F7;
      --hero-grad-c: #D0D9F8;
      --medi-1: #1E1438;
      --medi-2: #4A2060;
      --medi-3: #C45C8A;
      --cta-a: #C45C8A;
      --cta-b: #7B46C9;

      /* Typography — Heebo only */
      --font-ui: 'Heebo', system-ui, -apple-system, sans-serif;
      --font-display: 'Heebo', system-ui, sans-serif;
      --font-sanskrit: 'Heebo', system-ui, sans-serif;

      /* Shape */
      --r-sm: 12px;
      --r-md: 18px;
      --r-lg: 26px;
      --r-xl: 34px;

      /* Motion */
      --ease-breath: cubic-bezier(0.37, 0, 0.23, 1);

      /* App frame */
      --app-w: 430px;
    }

    [data-theme="ocean"] {
      --accent: #2882B8;
      --accent-2: #5AABCC;
      --accent-deep: #145680;
      --accent-wash: #C8E5F7;
      --accent-wash-2: #D5EEF8;
      --surface-grad-1: #EAF4FB;
      --surface-grad-2: #C9E4F5;
      --hero-grad-a: #D0EEFF;
      --hero-grad-b: #C8DEFF;
      --hero-grad-c: #D8D0FF;
      --medi-1: #08182E;
      --medi-2: #0F3055;
      --medi-3: #2882B8;
      --cta-a: #2882B8;
      --cta-b: #5B3FD4;
      --ink: #0E1E30;
      --ink-soft: #2A3F55;
      --ink-mute: #5A7890;
      --paper: #F7FBFF;
      --paper-2: #EFF6FD;
      --hair: rgba(20, 70, 120, 0.12);
      --hair-2: rgba(20, 70, 120, 0.06);
      --ivory: #E8F2FA;
      --ivory-2: #D8EAF7;
    }

    [data-theme="forest"] {
      --accent: #3A8A5A;
      --accent-2: #7AAF5A;
      --accent-deep: #235A38;
      --accent-wash: #C8EADA;
      --accent-wash-2: #D8EDD0;
      --surface-grad-1: #E8F5EE;
      --surface-grad-2: #CCE8D8;
      --hero-grad-a: #C8F0D8;
      --hero-grad-b: #D8ECC0;
      --hero-grad-c: #D0E8B8;
      --medi-1: #0C1E10;
      --medi-2: #1A3E25;
      --medi-3: #3A8A5A;
      --cta-a: #3A8A5A;
      --cta-b: #2D6E9A;
      --ink: #121E14;
      --ink-soft: #28442E;
      --ink-mute: #508860;
      --paper: #F5FBF7;
      --paper-2: #EAF6EE;
      --hair: rgba(30, 80, 40, 0.12);
      --hair-2: rgba(30, 80, 40, 0.06);
      --ivory: #E5F5EA;
      --ivory-2: #D5EEE0;
    }

    [data-theme="twilight"] {
      --accent: #7B4FD4;
      --accent-2: #AA6FD4;
      --accent-deep: #4D2898;
      --accent-wash: #E0D0FF;
      --accent-wash-2: #EDD8FF;
      --surface-grad-1: #F0E8FF;
      --surface-grad-2: #E0D0FF;
      --hero-grad-a: #EDD8FF;
      --hero-grad-b: #D8D0FF;
      --hero-grad-c: #D8C8F8;
      --medi-1: #100820;
      --medi-2: #2A1060;
      --medi-3: #7B4FD4;
      --cta-a: #9B3FC0;
      --cta-b: #4A28A0;
      --ink: #180E2E;
      --ink-soft: #38245C;
      --ink-mute: #7860A8;
      --paper: #FDFAFF;
      --paper-2: #F5F0FF;
      --hair: rgba(100, 60, 180, 0.14);
      --hair-2: rgba(100, 60, 180, 0.07);
      --ivory: #F0E8FF;
      --ivory-2: #E5D8FF;
    }

    /* ---- Reset ---- */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-ui);
      color: var(--ink);
      background: #DDD4EE;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-feature-settings: "kern";
      line-height: 1.4;
    }

    button {
      font-family: inherit;
      color: inherit;
    }

    input,
    select,
    textarea {
      font-family: inherit;
      color: inherit;
    }

    button,
    [role="button"] {
      cursor: pointer;
    }

    /* ---- App shell (mobile-first, centered on desktop) ---- */
    .shell {
      max-width: var(--app-w);
      min-height: 100vh;
      margin: 0 auto;
      background: var(--paper);
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 80px -40px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--hair-2);
    }

    /* Outer letterbox on desktop */
    .bg-stage {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1200px 800px at 20% 10%, #E8D5F5 0%, transparent 60%),
        radial-gradient(900px 700px at 85% 85%, #C8D5F5 0%, transparent 60%),
        #CEC0E0;
      z-index: -1;
    }

    /* ---- Screen container ---- */
    .screen {
      min-height: 100vh;
      padding-bottom: 96px;
      /* room for tab bar */
      position: relative;
      animation: fadeIn .5s var(--ease-breath);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ---- Top bar ---- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px 10px;
    }

    .topbar .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .topbar .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cta-a), var(--cta-b));
      box-shadow: 0 0 0 4px var(--accent-wash);
    }

    .topbar .greet {
      font-size: 12px;
      color: var(--ink-mute);
      letter-spacing: 0.01em;
      font-weight: 500;
    }

    /* ---- Bottom tab bar ---- */
    .tabbar {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(var(--app-w) - 28px);
      max-width: calc(100vw - 28px);
      background: rgba(253, 250, 255, 0.92);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(180, 140, 220, 0.2);
      border-radius: 999px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 6px;
      box-shadow: 0 16px 40px -10px rgba(100, 50, 160, 0.25);
      z-index: 50;
    }

    .tabbar button {
      appearance: none;
      background: transparent;
      border: 0;
      padding: 10px 4px 8px;
      border-radius: 999px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: var(--ink-mute);
      transition: color .3s var(--ease-breath), background .3s var(--ease-breath);
      font-weight: 600;
    }

    .tabbar button .ti {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
    }

    .tabbar button.active {
      background: linear-gradient(135deg, var(--cta-a) 0%, var(--cta-b) 100%);
      color: #fff;
    }

    .tabbar button.active .ti svg {
      stroke: #fff;
    }

    /* ---- HOME ---- */
    .home-hero {
      position: relative;
      margin: 6px 18px 0;
      border-radius: var(--r-xl);
      padding: 36px 28px 34px;
      overflow: hidden;
      background: linear-gradient(135deg,
          var(--hero-grad-a) 0%,
          var(--hero-grad-b) 50%,
          var(--hero-grad-c) 100%);
      box-shadow: 0 12px 40px -10px rgba(160, 80, 180, 0.22);
    }

    .home-hero .eyebrow {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent-deep);
      opacity: 0.8;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .home-hero h1 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 52px;
      line-height: 1.0;
      letter-spacing: -0.03em;
      margin: 0 0 6px;
      color: var(--ink);
    }

    .home-hero h1 .accent {
      color: var(--accent);
      font-weight: 900;
    }

    .home-hero .tagline {
      font-size: 15px;
      font-weight: 400;
      color: var(--ink-soft);
      max-width: 28ch;
      margin-top: 14px;
      line-height: 1.6;
    }

    .home-hero .mantra {
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent-deep);
      padding: 7px 14px 7px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .home-hero .orb {
      position: absolute;
      top: -50px;
      left: -50px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.7), transparent 60%),
        var(--accent);
      opacity: 0.22;
      filter: blur(4px);
    }

    .home-hero .orb.b {
      top: auto;
      bottom: -70px;
      left: auto;
      right: -60px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6), transparent 60%),
        var(--accent-2);
      opacity: 0.3;
      filter: blur(4px);
    }

    .home-hero .sig {
      position: absolute;
      bottom: 24px;
      left: 28px;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent-deep);
      letter-spacing: 0.03em;
      opacity: 0.7;
    }

    /* Section title */
    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 26px 26px 10px;
    }

    .section-title h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 20px;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .section-title .rule {
      flex: 1;
      height: 1px;
      background: var(--hair);
      margin: 0 14px;
      transform: translateY(-6px);
    }

    .section-title .more {
      font-size: 12px;
      color: var(--ink-mute);
      font-weight: 500;
    }

    /* Quick nav cards */
    .quick-grid {
      padding: 2px 18px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .quick {
      position: relative;
      background: var(--paper);
      border: none;
      border-radius: var(--r-lg);
      padding: 20px 18px 22px;
      min-height: 130px;
      transition: transform .35s var(--ease-breath), box-shadow .3s;
      text-align: start;
      overflow: hidden;
      box-shadow: 0 4px 20px -6px rgba(120, 60, 180, 0.14);
    }

    .quick:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px -6px rgba(120, 60, 180, 0.22);
    }

    .quick .qi {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: var(--accent-wash);
      display: grid;
      place-items: center;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .quick .qt {
      font-family: var(--font-display);
      font-size: 17px;
      letter-spacing: -0.02em;
      margin: 0 0 5px;
      font-weight: 700;
    }

    .quick .qs {
      font-size: 12px;
      color: var(--ink-mute);
      line-height: 1.45;
      font-weight: 400;
    }

    .quick.feature {
      grid-column: 1 / -1;
      background: linear-gradient(130deg, var(--cta-a) 0%, var(--cta-b) 100%);
      color: #fff;
      border: 0;
      min-height: 140px;
      box-shadow: 0 10px 30px -8px rgba(140, 50, 180, 0.45);
    }

    .quick.feature .qi {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      border-radius: 14px;
    }

    .quick.feature .qt {
      color: #fff;
    }

    .quick.feature .qs {
      color: rgba(255, 255, 255, 0.75);
    }

    .quick.feature .deco {
      position: absolute;
      inset: auto -30px -30px auto;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .quick.feature .deco.b {
      inset: auto -60px -60px auto;
      width: 200px;
      height: 200px;
      border: 1px solid rgba(255, 255, 255, 0.09);
    }

    /* Today's practice strip */
    .today-card {
      margin: 12px 18px 0;
      background: var(--paper);
      border: none;
      border-radius: var(--r-lg);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 20px -6px rgba(120, 60, 180, 0.14);
    }

    .today-card .tnum {
      font-family: var(--font-display);
      font-size: 44px;
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.03em;
    }

    .today-card .tcol {
      flex: 1;
    }

    .today-card .tlabel {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 3px;
      font-weight: 600;
    }

    .today-card .tname {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .today-card .tmeta {
      font-size: 12px;
      color: var(--ink-mute);
      margin-top: 2px;
      font-weight: 400;
    }

    .today-card .tgo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cta-a) 0%, var(--cta-b) 100%);
      color: #fff;
      border: 0;
      display: grid;
      place-items: center;
      transition: transform .3s var(--ease-breath), box-shadow .3s;
      box-shadow: 0 6px 16px -4px rgba(140, 50, 180, 0.5);
    }

    .today-card .tgo:hover {
      transform: scale(1.08);
    }

    /* ---- BOOKING ---- */
    .booking {
      padding: 4px 18px 0;
    }

    .booking h1 {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 6px 0 2px;
      padding: 0 8px;
    }

    .booking .sub {
      font-size: 13px;
      color: var(--ink-mute);
      padding: 0 8px;
      margin-bottom: 20px;
    }

    .segment {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      background: var(--ivory-2);
      padding: 5px;
      border-radius: 999px;
      margin: 0 8px 22px;
    }

    .segment button {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 10px 10px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-soft);
      transition: background .3s, color .3s;
    }

    .segment button.on {
      background: var(--paper);
      color: var(--ink);
      box-shadow: 0 2px 8px -2px rgba(0, 0, 0, 0.1);
    }

    .week-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 10px;
    }

    .week-head .month {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 500;
    }

    .week-head .arrows {
      display: flex;
      gap: 6px;
    }

    .week-head .arrows button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--hair);
      background: transparent;
      display: grid;
      place-items: center;
      color: var(--ink-soft);
    }

    .week-head .arrows button:hover {
      background: var(--ivory-2);
    }

    .week-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      padding: 0 4px;
      margin-bottom: 24px;
    }

    .day-pill {
      appearance: none;
      border: 1px solid var(--hair);
      background: var(--paper);
      border-radius: 16px;
      padding: 12px 4px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all .3s var(--ease-breath);
      position: relative;
    }

    .day-pill .dn {
      font-size: 10px;
      color: var(--ink-mute);
      letter-spacing: 0.05em;
    }

    .day-pill .dd {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 500;
    }

    .day-pill.full {
      opacity: .4;
    }

    .day-pill.sel {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .day-pill.sel .dn {
      color: rgba(255, 255, 255, 0.7);
    }

    .day-pill.avail::after {
      content: "";
      position: absolute;
      bottom: 6px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    .day-pill.sel.avail::after {
      background: var(--accent-wash);
    }

    .slots-label {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-mute);
      padding: 0 8px 10px;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 4px;
      margin-bottom: 22px;
    }

    .slot {
      appearance: none;
      border: 1px solid var(--hair);
      background: var(--paper);
      border-radius: 12px;
      padding: 13px 6px;
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      transition: all .25s var(--ease-breath);
      font-variant-numeric: tabular-nums;
    }

    .slot:hover:not(:disabled) {
      border-color: var(--accent);
    }

    .slot.on {
      background: linear-gradient(135deg, var(--cta-a), var(--cta-b));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 16px -4px rgba(140, 50, 180, 0.4);
    }

    .slot:disabled {
      opacity: 0.35;
      text-decoration: line-through;
      cursor: not-allowed;
    }

    .summary {
      margin: 4px 8px 14px;
      background: var(--paper-2);
      border: 1px solid var(--hair);
      border-radius: var(--r-lg);
      padding: 16px 18px;
    }

    .summary .srow {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
      border-bottom: 1px dashed var(--hair);
    }

    .summary .srow:last-child {
      border-bottom: 0;
    }

    .summary .sk {
      color: var(--ink-mute);
    }

    .summary .sv {
      font-weight: 500;
    }

    .cta {
      display: block;
      width: calc(100% - 16px);
      margin: 6px 8px 0;
      appearance: none;
      border: 0;
      background: linear-gradient(130deg, var(--cta-a) 0%, var(--cta-b) 100%);
      color: #fff;
      padding: 18px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: opacity .3s, transform .3s, box-shadow .3s;
      box-shadow: 0 8px 24px -6px rgba(140, 50, 180, 0.45);
    }

    .cta:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .cta:disabled {
      opacity: 0.35;
      box-shadow: none;
    }

    /* Confirmation modal */
    .confirm-veil {
      position: absolute;
      inset: 0;
      background: rgba(42, 38, 51, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: grid;
      place-items: center;
      z-index: 100;
      animation: fadeIn .4s var(--ease-breath);
    }

    .confirm {
      background: var(--paper);
      border-radius: var(--r-xl);
      padding: 36px 28px 28px;
      margin: 24px;
      text-align: center;
      max-width: 340px;
      animation: rise .5s var(--ease-breath);
    }

    @keyframes rise {
      from {
        transform: translateY(16px);
        opacity: 0;
      }

      to {
        transform: none;
        opacity: 1;
      }
    }

    .confirm .check {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: var(--accent-wash);
      display: grid;
      place-items: center;
      color: var(--accent-deep);
      position: relative;
    }

    .confirm .check::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      opacity: 0.3;
      animation: pulse 2s var(--ease-breath) infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.4;
      }

      70% {
        transform: scale(1.15);
        opacity: 0;
      }

      100% {
        transform: scale(1.15);
        opacity: 0;
      }
    }

    .confirm h3 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0 0 6px;
    }

    .confirm p {
      color: var(--ink-mute);
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 18px;
    }

    .confirm .namaste {
      font-family: var(--font-sanskrit);
      font-style: italic;
      color: var(--accent-deep);
      font-size: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--hair);
    }

    .confirm button {
      margin-top: 18px;
      width: 100%;
      appearance: none;
      border: 0;
      background: linear-gradient(130deg, var(--cta-a) 0%, var(--cta-b) 100%);
      color: #fff;
      padding: 15px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 8px 20px -6px rgba(140, 50, 180, 0.4);
    }

    /* ── Calendar export buttons ── */
    .cal-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1.5px solid var(--hair);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-display);
      cursor: pointer;
      text-decoration: none;
      color: var(--ink);
      background: var(--paper);
      transition: background 0.18s;
    }

    .cal-btn:hover {
      background: var(--surface);
    }

    .cal-btn.gcal {
      border-color: #4285F4;
      color: #4285F4;
    }

    .cal-btn.ical {
      border-color: #555;
      color: #555;
    }

    /* ---- LIBRARY ---- */
    .library {
      padding: 4px 18px 0;
    }

    .library h1 {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 6px 0 2px;
      padding: 0 8px;
    }

    .library .sub {
      font-size: 13px;
      color: var(--ink-mute);
      padding: 0 8px;
      margin-bottom: 18px;
    }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 8px 16px;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .filters button {
      appearance: none;
      border: 1px solid var(--hair);
      background: var(--paper);
      padding: 9px 16px;
      border-radius: 999px;
      font-size: 13px;
      color: var(--ink-soft);
      white-space: nowrap;
      transition: all .25s;
    }

    .filters button.on {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .pose-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 4px;
    }

    .pose {
      appearance: none;
      border: none;
      background: var(--paper);
      border-radius: var(--r-lg);
      padding: 16px 14px 16px;
      text-align: start;
      transition: all .3s var(--ease-breath);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 16px -6px rgba(120, 60, 180, 0.12);
    }

    .pose:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px -6px rgba(120, 60, 180, 0.22);
    }

    .pose .pose-art {
      height: 115px;
      margin: -4px -4px 12px;
      border-radius: 14px;
      background: linear-gradient(140deg, var(--hero-grad-a) 0%, var(--hero-grad-b) 60%, var(--hero-grad-c) 100%);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .pose .pose-art::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 100%, rgba(255, 255, 255, 0.45), transparent 50%);
    }

    .pose .ph {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .pose .ps {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      margin-top: 3px;
      direction: ltr;
      text-align: start;
      opacity: 0.8;
    }

    .pose .pmeta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 11px;
      color: var(--ink-mute);
      font-weight: 500;
    }

    .pose .play-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cta-a), var(--cta-b));
      color: #fff;
      display: grid;
      place-items: center;
      transition: all .25s;
      box-shadow: 0 4px 10px -3px rgba(140, 50, 180, 0.4);
    }

    .pose.speaking .play-badge {
      background: var(--accent);
      animation: speaking 1s var(--ease-breath) infinite;
    }

    @keyframes speaking {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
        box-shadow: 0 0 0 6px rgba(185, 85, 46, 0.15);
      }
    }

    .pose.speaking {
      border-color: var(--accent);
    }

    .pose.speaking .pose-art {
      background: linear-gradient(160deg, var(--accent) 0%, var(--accent-deep) 100%);
    }

    /* Anime-style pose figures — rounded soft body shapes */
    .pose-svg {
      width: 82%;
      height: 92%;
      position: relative;
      z-index: 1;
      animation: poseBreath 5.5s ease-in-out infinite;
      transform-origin: 50% 70%;
      overflow: visible;
    }

    .pose-svg.anime .body {
      fill: var(--accent-deep);
      stroke: none;
      transition: fill .3s;
    }

    .pose-svg.anime .skin {
      fill: #f6d9c0;
      stroke: var(--accent-deep);
      stroke-width: 1.2;
      transition: stroke .3s, fill .3s;
    }

    .pose-svg.anime .hair {
      fill: var(--ink);
      stroke: none;
      transition: fill .3s;
    }

    .pose-svg.anime .limb {
      fill: none;
      stroke: var(--accent-deep);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke .3s;
    }

    /* State: speaking — whites take over */
    .pose.speaking .pose-svg.anime .body {
      fill: rgba(255, 255, 255, 0.9);
    }

    .pose.speaking .pose-svg.anime .hair {
      fill: rgba(255, 255, 255, 0.95);
    }

    .pose.speaking .pose-svg.anime .skin {
      fill: #fff1e2;
      stroke: rgba(255, 255, 255, 0.9);
    }

    .pose.speaking .pose-svg.anime .limb {
      stroke: rgba(255, 255, 255, 0.9);
    }

    /* Breathing animation: gentle expand/contract + tiny sway */
    @keyframes poseBreath {

      0%,
      100% {
        transform: scale(1) translateY(0);
      }

      50% {
        transform: scale(1.035) translateY(-1px);
      }
    }

    .pose:nth-child(3n) .pose-svg {
      animation-duration: 6.2s;
      animation-delay: -0.8s;
    }

    .pose:nth-child(3n+1) .pose-svg {
      animation-duration: 5.8s;
      animation-delay: -1.6s;
    }

    .pose:nth-child(3n+2) .pose-svg {
      animation-duration: 5.2s;
      animation-delay: -2.4s;
    }

    .pose.speaking .pose-svg {
      animation-duration: 3.2s;
    }

    /* ---- MEDITATION ---- */
    .medi {
      min-height: 100vh;
      background:
        radial-gradient(80% 60% at 50% 30%, var(--medi-3) 0%, transparent 60%),
        radial-gradient(60% 50% at 80% 90%, var(--medi-2) 0%, transparent 60%),
        linear-gradient(180deg, var(--medi-1) 0%, var(--medi-2) 100%);
      color: rgba(255, 255, 255, 0.92);
      padding-bottom: 110px;
      position: relative;
      overflow: hidden;
      transition: background 6s ease;
      animation: driftColor 40s ease-in-out infinite alternate;
    }

    @keyframes driftColor {
      0% {
        filter: hue-rotate(0deg) brightness(1);
      }

      50% {
        filter: hue-rotate(-8deg) brightness(0.95);
      }

      100% {
        filter: hue-rotate(8deg) brightness(1.05);
      }
    }

    .medi .topbar {
      color: rgba(255, 255, 255, 0.9);
    }

    .medi .topbar .greet {
      color: rgba(255, 255, 255, 0.55);
    }

    .medi .topbar .dot {
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.12);
    }

    .medi-head {
      text-align: center;
      padding: 14px 20px 6px;
    }

    .medi-head .eyebrow {
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 6px;
    }

    .medi-head h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 4px;
      letter-spacing: -0.03em;
    }

    .medi-head p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      font-weight: 400;
      margin: 0;
      letter-spacing: 0.05em;
    }

    .breath-wrap {
      position: relative;
      margin: 30px auto 0;
      width: 300px;
      height: 300px;
      display: grid;
      place-items: center;
    }

    .breath {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .breath .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .breath .ring.r1 {
      width: 100%;
      height: 100%;
    }

    .breath .ring.r2 {
      width: 80%;
      height: 80%;
      border-color: rgba(255, 255, 255, 0.15);
    }

    .breath .ring.r3 {
      width: 60%;
      height: 60%;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .breath .orb {
      width: 50%;
      height: 50%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.8) 0%, transparent 45%),
        radial-gradient(circle at 70% 75%, var(--accent) 0%, transparent 55%),
        radial-gradient(circle at 40% 60%, var(--accent-2) 0%, transparent 60%),
        var(--medi-2);
      box-shadow: 0 20px 60px -10px var(--accent), inset 0 0 40px rgba(0, 0, 0, 0.25);
      transition: transform 0.1s linear;
    }

    .breath.running .orb {
      animation: breathe 10s var(--ease-breath) infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(0.7);
      }

      50% {
        transform: scale(1.2);
      }
    }

    .breath-label {
      position: absolute;
      font-family: var(--font-display);
      font-size: 15px;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.85);
      text-transform: lowercase;
      text-align: center;
      z-index: 3;
      pointer-events: none;
      font-weight: 300;
    }

    .breath-label small {
      display: block;
      font-size: 10px;
      letter-spacing: 0.3em;
      opacity: 0.6;
      margin-top: 3px;
      text-transform: uppercase;
      font-family: var(--font-ui);
    }

    .time-display {
      text-align: center;
      font-size: 56px;
      font-weight: 800;
      margin-top: 18px;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      color: rgba(255, 255, 255, 0.97);
    }

    .durations {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 18px 0 22px;
      padding: 0 24px;
    }

    .duration {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.85);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      transition: all .3s;
      backdrop-filter: blur(10px);
    }

    .duration:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .duration.on {
      background: rgba(255, 255, 255, 0.95);
      color: var(--medi-2);
      border-color: transparent;
    }

    .medi-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 0 24px;
    }

    .medi-btn {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      transition: all .3s;
      backdrop-filter: blur(10px);
    }

    .medi-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .medi-btn.primary {
      width: 78px;
      height: 78px;
      background: rgba(255, 255, 255, 0.95);
      color: var(--medi-2);
      border: 0;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.4);
    }

    .medi-btn.primary:hover {
      transform: scale(1.04);
    }

    .medi-btn.mute.off {
      opacity: 0.55;
    }

    .sound-label {
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 24px;
    }

    /* ---- Tweaks panel ---- */
    .tweaks-panel {
      position: fixed;
      bottom: 92px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(var(--app-w) - 36px);
      max-width: calc(100vw - 36px);
      background: rgba(251, 247, 239, 0.96);
      backdrop-filter: blur(20px);
      border: 1px solid var(--hair);
      border-radius: var(--r-lg);
      padding: 16px 18px;
      z-index: 60;
      box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.25);
      animation: rise .4s var(--ease-breath);
    }

    .tweaks-panel h4 {
      margin: 0 0 10px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tweaks-panel h4 button {
      appearance: none;
      background: transparent;
      border: 0;
      color: var(--ink-mute);
      font-size: 18px;
      line-height: 1;
      padding: 0;
    }

    .tweaks-row {
      margin-bottom: 14px;
    }

    .tweaks-row:last-child {
      margin-bottom: 0;
    }

    .tweaks-row .lbl {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .theme-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .theme-chip {
      appearance: none;
      border: 1px solid var(--hair);
      background: var(--paper);
      border-radius: 12px;
      padding: 10px 4px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: all .25s;
    }

    .theme-chip.on {
      border-color: var(--ink);
      background: var(--ivory-2);
    }

    .theme-chip .swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      overflow: hidden;
    }

    .theme-chip .swatch b {
      flex: 1;
      display: block;
    }

    .theme-chip .name {
      font-size: 11px;
      font-weight: 500;
    }

    .density-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .density-chip {
      appearance: none;
      border: 1px solid var(--hair);
      background: var(--paper);
      border-radius: 10px;
      padding: 9px 8px;
      font-size: 12px;
      font-weight: 500;
      transition: all .25s;
    }

    .density-chip.on {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    /* Layout-variant tweak on Home: denser grid */
    .shell[data-layout="dense"] .quick-grid {
      gap: 8px;
    }

    .shell[data-layout="dense"] .quick {
      min-height: 108px;
      padding: 14px 14px 16px;
    }

    .shell[data-layout="dense"] .quick.feature {
      min-height: 118px;
    }

    .shell[data-layout="spacious"] .quick {
      min-height: 148px;
      padding: 22px 20px 24px;
    }

    /* tab bar hide while tweaks open is optional — keep visible */

    /* small screen adjustments */
    @media (max-width: 460px) {
      .shell {
        box-shadow: none;
      }

      .tabbar {
        width: calc(100vw - 28px);
      }
    }

    /* ======================================================================
   Instructor Dashboard
   ====================================================================== */

    .dash {
      min-height: 100vh;
      padding-bottom: 40px;
      background: linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
      animation: fadeIn .5s var(--ease-breath);
    }

    .dash-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 22px 18px;
      background: linear-gradient(130deg, var(--cta-a) 0%, var(--cta-b) 100%);
      color: #fff;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 12px 30px -8px rgba(140, 50, 180, 0.4);
    }

    .dash-top::before {
      content: "";
      position: absolute;
      inset: auto -40px -60px auto;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--accent) 0%, transparent 60%);
      opacity: 0.35;
    }

    .dash-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .dash-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--paper);
      display: grid;
      place-items: center;
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 500;
      box-shadow: 0 6px 20px -4px rgba(0, 0, 0, 0.4);
    }

    .dash-hello {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .dash-role {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .dash-exit {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: var(--paper);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 1;
      transform: scaleX(-1);
      /* rtl arrow */
    }

    .dash-exit:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .dash-nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin: 14px 16px 0;
      padding: 5px;
      background: var(--ivory-2);
      border-radius: 14px;
    }

    .dash-nav button {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 9px 4px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: var(--ink-soft);
      font-weight: 500;
      transition: background .25s, color .25s;
    }

    .dash-nav button.on {
      background: var(--paper);
      color: var(--ink);
      box-shadow: 0 2px 6px -2px rgba(0, 0, 0, 0.12);
    }

    .dash-body {
      padding: 16px 16px 0;
    }

    /* ---- Overview ---- */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      position: relative;
      background: var(--paper);
      border: 1px solid var(--hair);
      border-radius: 18px;
      padding: 14px 14px 16px;
      overflow: hidden;
    }

    .stat.card-lg {
      grid-column: 1 / -1;
      padding: 16px 18px 14px;
    }

    .stat-k {
      font-size: 11px;
      color: var(--ink-mute);
      letter-spacing: 0.12em;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .stat-v {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .stat-v small {
      font-size: 16px;
      color: var(--ink-mute);
      margin-inline-start: 2px;
    }

    .stat-delta {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-top: 8px;
      font-size: 11px;
      color: var(--ink-mute);
    }

    .stat-delta.up {
      color: var(--accent-2);
    }

    .mini-chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 36px;
      margin-top: 10px;
    }

    .mini-chart .bar {
      flex: 1;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-wash) 100%);
      border-radius: 2px 2px 0 0;
      min-height: 4px;
    }

    .ring-prog {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 36px;
      height: 36px;
    }

    .dash-section {
      margin-top: 20px;
      background: var(--paper);
      border: 1px solid var(--hair);
      border-radius: 18px;
      padding: 16px 18px 18px;
    }

    .dash-section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .dash-section-head h3 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 500;
      margin: 0;
    }

    .dash-section-head .hint {
      font-size: 11px;
      color: var(--ink-mute);
      letter-spacing: 0.08em;
    }

    .linkish {
      appearance: none;
      background: transparent;
      border: 0;
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }

    .heatmap {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      align-items: end;
    }

    .hcol {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .hbar {
      width: 18px;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
      transition: height .4s var(--ease-breath);
    }

    .hlab {
      font-size: 11px;
      color: var(--ink-mute);
    }

    .hnum {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
    }

    .next-classes {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .next-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px dashed var(--hair);
    }

    .next-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .next-time {
      min-width: 56px;
      text-align: center;
      padding: 8px 0;
      background: var(--ivory-2);
      border-radius: 10px;
    }

    .nt-day {
      font-size: 10px;
      color: var(--ink-mute);
    }

    .nt-time {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .next-col {
      flex: 1;
    }

    .next-type {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 500;
    }

    .next-loc {
      font-size: 12px;
      color: var(--ink-mute);
      margin-top: 2px;
    }

    .next-fill {
      background: var(--accent-wash);
      color: var(--accent-deep);
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .next-fill.full {
      background: var(--ink);
      color: var(--paper);
    }

    .next-fill strong {
      font-family: var(--font-display);
      font-size: 14px;
    }

    /* ---- Class list ---- */
    .day-group {
      margin-bottom: 18px;
    }

    .day-group-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 0 4px 8px;
    }

    .dgh-day {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 500;
    }

    .dgh-date {
      font-size: 12px;
      color: var(--ink-mute);
    }

    .class-card {
      background: var(--paper);
      border: 1px solid var(--hair);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 12px;
      transition: border-color .3s;
    }

    .class-card.pulse {
      border-color: var(--accent);
      animation: pulseBorder 2s var(--ease-breath) 2;
    }

    @keyframes pulseBorder {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(185, 85, 46, 0);
      }

      50% {
        box-shadow: 0 0 0 6px rgba(185, 85, 46, 0.12);
      }
    }

    .cc-time {
      background: var(--ivory-2);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      align-self: start;
    }

    .cct-num {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .cct-type {
      font-size: 10px;
      color: var(--ink-mute);
      margin-top: 3px;
      line-height: 1.2;
    }

    .cc-body {
      align-self: center;
    }

    .cc-loc {
      font-size: 12px;
      color: var(--ink-mute);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 8px;
    }

    .cc-progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cc-bar {
      flex: 1;
      height: 6px;
      background: var(--ivory-2);
      border-radius: 3px;
      overflow: hidden;
    }

    .cc-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-2) 0%, var(--accent) 100%);
      border-radius: 3px;
      transition: width .5s var(--ease-breath);
    }

    .cc-count {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      color: var(--ink-mute);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cc-count strong {
      font-family: var(--font-display);
      font-size: 15px;
      color: var(--ink);
    }

    .new-pill {
      background: var(--accent);
      color: #fff;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 99px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .cc-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--hair);
    }

    .ca {
      flex: 1;
      appearance: none;
      border: 1px solid var(--hair);
      background: transparent;
      padding: 8px;
      border-radius: 10px;
      font-size: 12px;
      color: var(--ink-soft);
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all .2s;
    }

    .ca:hover {
      background: var(--ivory-2);
    }

    .ca.danger {
      color: #a13b23;
    }

    .ca.danger:hover {
      background: #f5dcd4;
      border-color: #d9a193;
    }

    /* ---- Add form ---- */
    .add-form {
      background: var(--paper);
      border: 1px solid var(--hair);
      border-radius: 20px;
      padding: 20px 20px 18px;
    }

    .form-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .form-sub {
      font-size: 13px;
      color: var(--ink-mute);
      margin: 4px 0 20px;
    }

    .field {
      display: block;
      margin-bottom: 14px;
    }

    .field>span {
      display: block;
      font-size: 11px;
      color: var(--ink-mute);
      letter-spacing: 0.12em;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--hair);
      border-radius: 12px;
      background: var(--paper-2);
      font-size: 14px;
      font-family: var(--font-ui);
      color: var(--ink);
      transition: border-color .2s;
      appearance: none;
    }

    .field input:focus,
    .field select:focus {
      outline: 0;
      border-color: var(--accent);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .cap-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--paper-2);
      border: 1px solid var(--hair);
      border-radius: 12px;
      padding: 5px;
    }

    .cap-row button {
      appearance: none;
      border: 0;
      background: var(--paper);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 18px;
      color: var(--ink);
      border: 1px solid var(--hair);
    }

    .cap-val {
      flex: 1;
      text-align: center;
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .warn {
      font-size: 11px;
      color: #a13b23;
      margin-top: 6px;
    }

    .form-actions {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 8px;
      margin-top: 8px;
    }

    .form-actions button,
    .modal-foot button {
      appearance: none;
      border: 0;
      padding: 14px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 500;
    }

    .form-actions .ghost,
    .modal-foot .ghost {
      background: var(--ivory-2);
      color: var(--ink);
    }

    .form-actions .primary,
    .modal-foot .primary {
      background: var(--ink);
      color: var(--paper);
    }

    /* ---- Students ---- */
    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--paper);
      border: 1px solid var(--hair);
      border-radius: 99px;
      color: var(--ink-mute);
      margin-bottom: 10px;
    }

    .search input {
      flex: 1;
      border: 0;
      background: transparent;
      font-size: 14px;
      outline: none;
    }

    .student-stats {
      display: flex;
      gap: 20px;
      padding: 6px 4px 14px;
      font-size: 12px;
      color: var(--ink-mute);
    }

    .student-stats strong {
      font-family: var(--font-display);
      color: var(--ink);
      font-size: 15px;
      font-weight: 500;
      margin-inline-end: 4px;
    }

    .student-list {
      background: var(--paper);
      border: 1px solid var(--hair);
      border-radius: 16px;
      overflow: hidden;
    }

    .student-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--hair-2);
    }

    .student-row:last-child {
      border-bottom: 0;
    }

    .st-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-wash);
      color: var(--accent-deep);
      display: grid;
      place-items: center;
      font-family: var(--font-display);
      font-weight: 500;
    }

    .st-col {
      flex: 1;
    }

    .st-name {
      font-size: 14px;
      font-weight: 500;
    }

    .st-phone {
      font-size: 12px;
      color: var(--ink-mute);
      direction: ltr;
      text-align: start;
    }

    .st-meta {
      text-align: center;
      padding: 4px 10px;
      background: var(--ivory-2);
      border-radius: 8px;
    }

    .st-count {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 500;
    }

    .st-count-lbl {
      font-size: 9px;
      color: var(--ink-mute);
    }

    .empty {
      text-align: center;
      color: var(--ink-mute);
      padding: 40px 20px;
      font-size: 14px;
    }

    /* ---- Modals ---- */
    .modal-veil {
      position: absolute;
      inset: 0;
      background: rgba(42, 38, 51, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn .3s var(--ease-breath);
    }

    .modal {
      width: 100%;
      background: var(--paper);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      animation: rise .4s var(--ease-breath);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 10px;
      border-bottom: 1px solid var(--hair);
    }

    .modal-head h3 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 500;
    }

    .modal-head button {
      appearance: none;
      border: 0;
      background: transparent;
      font-size: 20px;
      color: var(--ink-mute);
      line-height: 1;
    }

    .modal-body {
      padding: 16px 20px;
      overflow-y: auto;
    }

    .modal-foot {
      padding: 12px 16px 18px;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 8px;
      border-top: 1px solid var(--hair);
    }

    .roster-meta {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px 12px;
      background: var(--ivory-2);
      font-size: 13px;
      color: var(--ink-soft);
    }

    .roster-count strong {
      font-family: var(--font-display);
      font-size: 16px;
      margin-inline-end: 2px;
    }

    .roster-list {
      padding: 6px 0 18px;
      overflow-y: auto;
      flex: 1;
    }

    .roster-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--hair-2);
      transition: background .3s;
    }

    .roster-row:last-child {
      border-bottom: 0;
    }

    .roster-row.new {
      background: rgba(185, 85, 46, 0.06);
      animation: flashIn 2s var(--ease-breath);
    }

    @keyframes flashIn {
      0% {
        background: rgba(185, 85, 46, 0.25);
      }

      100% {
        background: rgba(185, 85, 46, 0.06);
      }
    }

    .ri {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--ivory-2);
      display: grid;
      place-items: center;
      font-size: 11px;
      color: var(--ink-mute);
      font-family: var(--font-display);
      font-weight: 500;
    }

    .rc {
      flex: 1;
    }

    .rn {
      font-size: 14px;
      font-weight: 500;
    }

    .rp {
      font-size: 11px;
      color: var(--ink-mute);
      direction: ltr;
      text-align: start;
    }

    .rj {
      text-align: center;
    }

    .rj-lbl {
      font-size: 9px;
      color: var(--ink-mute);
      letter-spacing: 0.08em;
    }

    .rj-val {
      font-size: 12px;
      font-family: var(--font-display);
      font-weight: 500;
    }

    .ri-rm {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--ink-mute);
      font-size: 16px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }

    .ri-rm:hover {
      background: var(--ivory-2);
      color: #a13b23;
    }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--paper);
      padding: 12px 20px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.4);
      z-index: 200;
      animation: toastIn .3s var(--ease-breath);
      max-width: calc(100vw - 40px);
      text-align: center;
    }

    @keyframes toastIn {
      from {
        transform: translate(-50%, 20px);
        opacity: 0;
      }

      to {
        transform: translate(-50%, 0);
        opacity: 1;
      }
    }

    /* Tweaks: instructor mode toggle */
    .instructor-toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--ivory-2);
      padding: 10px 14px;
      border-radius: 10px;
    }

    .instructor-toggle-row .ilbl {
      font-size: 12px;
      font-weight: 500;
    }

    .instructor-toggle-row button {
      appearance: none;
      border: 0;
      background: var(--ink);
      color: var(--paper);
      padding: 7px 14px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
    }

    /* ======================================================================
   Profile / Auth screen
   ====================================================================== */

    /* Tab bar — 5 columns now */
    .tabbar {
      grid-template-columns: repeat(5, 1fr);
    }

    .tabbar button {
      font-size: 10px;
      padding: 8px 2px 7px;
      gap: 2px;
    }

    /* Tab profile avatar icon */
    .tab-profile-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, var(--cta-a), var(--cta-b));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }

    .tab-profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tabbar button.active .tab-profile-avatar {
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5);
    }

    /* Profile screen loading spinner */
    .profile-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }

    .pload-orb {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid var(--accent-wash);
      border-top-color: var(--accent);
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Auth wrapper */
    .auth-wrap {
      padding: 8px 24px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .auth-avatar-guest {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--hero-grad-a), var(--hero-grad-b));
      display: grid;
      place-items: center;
      color: var(--accent);
      margin-bottom: 20px;
      box-shadow: 0 14px 40px -10px rgba(140, 50, 180, 0.22);
    }

    .auth-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 8px;
      color: var(--ink);
    }

    .auth-sub {
      font-size: 13px;
      color: var(--ink-mute);
      text-align: center;
      max-width: 26ch;
      line-height: 1.55;
      margin-bottom: 28px;
      font-weight: 400;
    }

    /* Social sign-in buttons (Google + Apple side by side) */
    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 10px;
      border-radius: 14px;
      border: 1.5px solid var(--hair);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s;
      font-family: var(--font-ui);
      box-shadow: 0 2px 10px -4px rgba(0, 0, 0, 0.08);
    }

    .social-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px -6px rgba(0, 0, 0, 0.14);
    }

    .social-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .social-btn.google {
      background: var(--paper);
      color: var(--ink);
    }

    .social-btn.google:hover:not(:disabled) {
      background: var(--paper-2);
    }

    .social-btn.apple {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .social-btn.apple:hover:not(:disabled) {
      background: #2a2a2a;
    }

    .auth-or {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 12px;
      margin: 18px 0;
      font-size: 12px;
      color: var(--ink-mute);
      font-weight: 500;
    }

    .auth-or::before,
    .auth-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--hair);
    }

    /* Auth form */
    .auth-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .auth-field {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--paper-2);
      border: 1.5px solid var(--hair);
      border-radius: 14px;
      padding: 0 14px;
      transition: border-color .25s;
    }

    .auth-field:focus-within {
      border-color: var(--accent);
      background: var(--paper);
    }

    .auth-field-icon {
      color: var(--ink-mute);
      display: flex;
      align-items: center;
      font-size: 13px;
      flex-shrink: 0;
      font-weight: 600;
    }

    .auth-field input {
      flex: 1;
      border: 0;
      background: transparent;
      padding: 14px 0;
      font-size: 14px;
      font-weight: 500;
      outline: none;
      color: var(--ink);
      font-family: var(--font-ui);
    }

    .auth-field input::placeholder {
      color: var(--ink-mute);
    }

    .auth-error {
      background: #FFF0F3;
      border: 1px solid #FFBDCA;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      color: #B02040;
      font-weight: 500;
      direction: rtl;

      font-size: 15px;
      font-weight: 700;
      margin-top: 6px;

      transition: opacity .25s, transform .25s;
      cursor: pointer;
      font-family: var(--font-ui);
    }

      opacity: 0.92;
      transform: translateY(-1px);
    }

      opacity: 0.45;
      box-shadow: none;
      cursor: not-allowed;
    }

      appearance: none;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      margin-top: 16px;
      padding: 6px;
      cursor: pointer;
      font-family: var(--font-ui);
    }

    .admin-badge-btn {
      margin-top: 10px;
      padding: 8px 20px;
      border-radius: 999px;
      background: linear-gradient(130deg, #ff9800, #e91e63);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 14px -4px rgba(233, 30, 99, 0.4);
      font-family: var(--font-display);
    }

    .gender-pill {
      flex: 1;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--hair);
      background: var(--paper);
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
    }

      background: linear-gradient(130deg, var(--cta-a), var(--cta-b));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 12px -4px rgba(180, 60, 140, 0.4);

      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 24px 26px;
    }

      width: 100px;
      height: 100px;
      border-radius: 50%;

      align-items: center;
      justify-content: center;

      font-weight: 900;
      color: #fff;

      border: 4px solid rgba(255, 255, 255, 0.9);
      letter-spacing: -0.03em;

      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-display-name {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;

      background: var(--paper-2);
      border: 1px solid var(--hair);
      border-radius: 999px;
      padding: 5px 14px;
      font-weight: 500;

      text-align: center;

      color: var(--accent);

      font-size: 11px;
      color: var(--ink-mute);
      font-weight: 500;
      margin-top: 5px;

      border-radius: 999px;
      cursor: pointer;
      transition: all .25s;
      font-family: var(--font-ui);

      background: var(--ivory-3);
      color: var(--ink);

    }

      font-weight: 800;
      letter-spacing: -0.02em;

      color: var(--accent);
      flex-shrink: 0;
    }

    .nm-row.off .nm-icon {
      background: var(--ivory-2);
      color: var(--ink-mute);
    }

    .nm-label {
      flex: 1;
    }

    .nm-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .nm-state {

      color: var(--ink-mute);
      margin-top: 2px;
      font-weight: 500;
    }

    .nm-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      appearance: none;
      border: 1.5px solid var(--hair);

      opacity: 0.4;

      pointer-events: none;
    }

      display: block;

      font-size: 11px;
      color: var(--ink-mute);
      margin-top: 14px;
      font-weight: 500;

    // Handpan ambient synth — Web Audio API
    // Hang drum / handpan frequencies in D minor (classic "D Kurd" scaling)
    // Notes: D3, A3, Bb3, C4, D4, E4, F4, G4, A4

    const HANDPAN_NOTES = [146.83, 220.00, 233.08, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00];

    class HandpanEngine {
      constructor() {
        this.ctx = null;
        this.master = null;
        this.timer = null;
        this.playing = false;
        this._muted = false;
      }
      _init() {
        if (this.ctx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AC();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0;

        // gentle reverb via convolver w/ synthetic IR
        const conv = this.ctx.createConvolver();
        conv.buffer = this._makeIR(3.2, 2.6);
        const rev = this.ctx.createGain();
        rev.gain.value = 0.55;
        const dry = this.ctx.createGain();
        dry.gain.value = 0.65;

        this.master.connect(dry);
        this.master.connect(conv);
        conv.connect(rev);
        dry.connect(this.ctx.destination);
        rev.connect(this.ctx.destination);
      }
      _makeIR(duration, decay) {
        const rate = this.ctx.sampleRate;
        const len = Math.floor(rate * duration);
        const buf = this.ctx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) {
          const data = buf.getChannelData(c);
          for (let i = 0; i < len; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
          }
        }
        return buf;
      }
      _pluck(freq, when, vel = 0.5) {
        const ctx = this.ctx;
        // Two-oscillator "bell-like" tone with short attack + long decay
        const g = ctx.createGain();
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(vel, when + 0.015);
        g.gain.exponentialRampToValueAtTime(0.0005, when + 3.8);

        const o1 = ctx.createOscillator();
        o1.type = 'sine';
        o1.frequency.setValueAtTime(freq, when);

        const o2 = ctx.createOscillator();
        o2.type = 'sine';
        o2.frequency.setValueAtTime(freq * 2.01, when);
        const g2 = ctx.createGain();
        g2.gain.value = 0.3;

        // subtle detune for warmth
        const o3 = ctx.createOscillator();
        o3.type = 'triangle';
        o3.frequency.setValueAtTime(freq * 0.5, when);
        const g3 = ctx.createGain();
        g3.gain.value = 0.15;

        // low-pass filter for softness
        const lp = ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.setValueAtTime(2400, when);
        lp.Q.value = 0.8;

        o1.connect(g);
        o2.connect(g2); g2.connect(g);
        o3.connect(g3); g3.connect(g);
        g.connect(lp);
        lp.connect(this.master);

        o1.start(when); o1.stop(when + 4);
        o2.start(when); o2.stop(when + 4);
        o3.start(when); o3.stop(when + 4);
      }
      async play() {
        this._init();
        if (this.ctx.state === 'suspended') await this.ctx.resume();
        if (this.playing) return;
        this.playing = true;

        // Fade master in
        const t0 = this.ctx.currentTime;
        this.master.gain.cancelScheduledValues(t0);
        this.master.gain.setValueAtTime(this.master.gain.value, t0);
        this.master.gain.linearRampToValueAtTime(this._muted ? 0 : 0.22, t0 + 1.5);

        const schedule = () => {
          if (!this.playing) return;
          const now = this.ctx.currentTime;
          // Schedule 2-3 notes over the next ~6-9 seconds
          const count = 2 + Math.floor(Math.random() * 2);
          for (let i = 0; i < count; i++) {
            const delay = i * (2 + Math.random() * 1.5);
            const note = HANDPAN_NOTES[Math.floor(Math.random() * HANDPAN_NOTES.length)];
            const vel = 0.25 + Math.random() * 0.35;
            this._pluck(note, now + delay, vel);
          }
          this.timer = setTimeout(schedule, (count * 2.2 + 1) * 1000);
        };
        schedule();
      }
      pause() {
        if (!this.ctx) return;
        this.playing = false;
        if (this.timer) { clearTimeout(this.timer); this.timer = null; }
        const t = this.ctx.currentTime;
        this.master.gain.cancelScheduledValues(t);
        this.master.gain.setValueAtTime(this.master.gain.value, t);
        this.master.gain.linearRampToValueAtTime(0, t + 1.2);
      }
      setMuted(m) {
        this._muted = m;
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        this.master.gain.cancelScheduledValues(t);
        this.master.gain.linearRampToValueAtTime(m ? 0 : 0.22, t + 0.5);
      }
      // Play a pleasant resolution chord
      bell(duration = 2) {
        this._init();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        [293.66, 349.23, 440.00].forEach((f, i) => {
          this._pluck(f, now + i * 0.18, 0.4);
        });
      }
    }

    // Pronounce Sanskrit via Web Speech API with sensible fallbacks
    function speakSanskrit(text, opts = {}) {
      if (!('speechSynthesis' in window)) return Promise.resolve();
      return new Promise((resolve) => {
        try {
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.rate = opts.rate ?? 0.78;
          u.pitch = opts.pitch ?? 1.0;
          u.volume = 1.0;
          // Try Indian English, Hindi, then any English voice for Sanskrit approximations
          const voices = window.speechSynthesis.getVoices();
          const pick =
            voices.find(v => /en-IN/i.test(v.lang)) ||
            voices.find(v => /hi-IN/i.test(v.lang)) ||
            voices.find(v => /sa-IN/i.test(v.lang)) ||
            voices.find(v => /en-(US|GB)/i.test(v.lang)) ||
            voices[0];
          if (pick) u.voice = pick;
          u.onend = () => resolve();
          u.onerror = () => resolve();
          window.speechSynthesis.speak(u);
        } catch (e) { resolve(); }
      });
    }
